        function obtenerGrupo(pos) {
    // 1. Verificamos que 'grupos' exista y sea un array
    if (typeof grupos === 'undefined' || !Array.isArray(grupos)) {
        return null;
    }

    // 2. Buscamos el grupo de forma segura
    // Usamos ?. (encadenamiento opcional) para evitar errores si 'indices' falta
    return grupos.find(g => g.indices && g.indices.includes(pos)) || null;
}


        function getColorEquipo(equipo) {
    if (equipo === "A") return "#4a90e2"; // Azul para equipo A
    if (equipo === "B") return "#e74c3c"; // Rojo para equipo B
    return "#cccccc"; // Gris por defecto
}
        
        // Función que verifica si el equipo tiene el monopolio de un color
function verificarMonopolioEquipo(pos, equipo, data) {
    let grupoColor = obtenerGrupo(pos).color;
    let propiedades = data.propiedades || {};
    let totalNecesario = obtenerGrupo(pos).indices.length;
    let propiedadesEquipo = 0;

    // Iteramos sobre todas las propiedades buscando coincidencias de equipo y color
    for (let pId in propiedades) {
        if (propiedades[pId].color === grupoColor && propiedades[pId].equipo === equipo) {
            propiedadesEquipo++;
        }
    }
    return propiedadesEquipo === totalNecesario;
}

        window.abrirInfoReputacion = function() {
    // 1. Verificación de seguridad para evitar que el juego se bloquee
    if (typeof jugadores === 'undefined' || !jugadores || !jugadores[miIdx]) {
        console.warn("Información de jugadores no disponible todavía.");
        alert("Cargando datos de jugador... espera un momento.");
        return;
    }

    // 2. Obtener reputación con valor por defecto de 50
    let rep = jugadores[miIdx].reputacion || 50; 
    let estrellas = "";
    let descripcion = "";

    // 3. Lógica de estrellas
    if (rep >= 90) { 
        estrellas = "★★★★★"; 
        descripcion = "Hotel de Lujo. Tus propiedades son un éxito absoluto. ¡Alquileres +10%!"; 
    } else if (rep >= 70) { 
        estrellas = "★★★★☆"; 
        descripcion = "Muy valorado. Los visitantes están encantados con tu gestión."; 
    } else if (rep >= 50) { 
        estrellas = "★★★☆☆"; 
        descripcion = "Estándar. Todo funciona correctamente, pero puedes mejorar."; 
    } else if (rep >= 30) { 
        estrellas = "★★☆☆☆"; 
        descripcion = "Necesitas mantenimiento. Los clientes han dejado quejas recientes."; 
    } else { 
        estrellas = "★☆☆☆☆"; 
        descripcion = "Reputación crítica. Se esparcen rumores negativos. ¡Tus alquileres están bajando!"; 
    }

    // 4. Mostrar en el modal
    document.getElementById('modal-title').innerText = "Reseña de Visitantes";
    document.getElementById('modal-text').innerHTML = `
        <div style="font-size: 40px; color: #ffd700; margin: 10px 0; text-shadow: 1px 1px 2px #555;">${estrellas}</div>

        <p style="font-size: 13px; color: #ff59aa;">Tu puntaje actual: <b>${rep}/100</b></p>
    `;

    document.getElementById('modal').style.display = 'block';
};

        function actualizarVisualReputacion(valor) {
    // Aseguramos que el valor esté entre 0 y 100
    if (valor < 0) valor = 0;
    if (valor > 100) valor = 100;
    
    let barra = document.getElementById('rep-bar');
    if (barra) {

   }
}

        window.verificarLogros = function(idx) {
    // 1. Seguridad: Verificar que el jugador y sus datos existan antes de procesar
    if (!window.jugadores || !window.jugadores[idx]) {
        console.warn("Verificación de logros ignorada: datos del jugador aún no cargados.");
        return;
    }

    let jugador = window.jugadores[idx];
    let rep = jugador.reputacion || 0;
    let cambios = {}; 

    // 2. Lógica para Magnate de la Reputación (100)
    // Se asegura de no añadir el escudo si ya lo tiene (además de la validación !jugador.escudo)
    if (rep >= 100 && !jugador.escudo) {
        cambios.escudo = true;
        alert("¡FELICIDADES! Has alcanzado 100 de reputación. ¡Has ganado un ESCUDO DE LUJO!");
    }

    // 3. Lógica para Hotel en Ruinas (0)
    // Se asegura de no reiniciar una quiebra técnica existente
    if (rep <= 0 && (!jugador.quiebraTecnica || jugador.quiebraTecnica === 0)) {
        cambios.quiebraTecnica = 2;

    }

    // 4. Si hubo cambios, enviamos a Firebase con una ruta dinámica segura
    if (Object.keys(cambios).length > 0 && typeof sala !== 'undefined') {
        db.ref('salas/' + sala + '/jugadores/' + idx).update(cambios)
            .catch(error => console.error("Error al actualizar logros:", error));
    }
};

        function pagarAlquiler(duenoIdx, inquilinoIdx, precioBase) {
    
    // 1. VERIFICACIÓN DE QUIEBRA TÉCNICA (El dueño no puede cobrar)
    if (window.jugadores[duenoIdx] && window.jugadores[duenoIdx].quiebraTecnica > 0) {
        alert("El dueño está en Quiebra Técnica y no puede cobrar alquileres en este momento.");
        return; // El pago se cancela
    }

    // 2. VERIFICACIÓN DEL ESCUDO DE LUJO (El dueño está protegido)
    if (window.jugadores[duenoIdx] && window.jugadores[duenoIdx].escudo) {
        alert("¡El alquiler fue bloqueado por el Escudo de Lujo!");
        db.ref('salas/' + sala + '/jugadores/' + duenoIdx).update({ escudo: false });
        return; // ¡Se bloquea el pago!
    }

    // 3. CÁLCULO CON REPUTACIÓN
    let monto = calcularAlquiler(precioBase, duenoIdx);
    
    // 4. EJECUCIÓN DEL COBRO REAL
    let dineroInquilino = window.jugadores[inquilinoIdx].dinero - monto;
    let dineroDueno = window.jugadores[duenoIdx].dinero + monto;

    db.ref('salas/' + sala + '/jugadores/' + inquilinoIdx).update({ dinero: dineroInquilino });
    db.ref('salas/' + sala + '/jugadores/' + duenoIdx).update({ dinero: dineroDueno });

// 3. Función principal de unión (con reconexión)
function procederConUnion(nombreSala) {
    sala = nombreSala;
    if (yaEntro) return;
    
    let btn = document.getElementById('btn-unirse');
    if (btn) btn.disabled = true;

    db.ref('salas/' + sala + '/jugadores').once('value', snap => {
        let jugadores = snap.val() || [];
        let miNombreGuardado = localStorage.getItem('monopoly_nombre');
        let encontrado = false;
        let indexEncontrado = -1;

        // 1. BUSCAR POR NOMBRE: Si el nombre ya existe en la sala, reconectamos
        jugadores.forEach((j, index) => {
            if (j && j.nombre === miNombreGuardado) {
                indexEncontrado = index;
                encontrado = true;
            }
        });

        // 2. Asignar miIdx correctamente
        if (encontrado) {
            miIdx = indexEncontrado;
            console.log("Reconectado como: " + miNombreGuardado + " en índice: " + miIdx);
        } else {
            // Nuevo jugador: usamos el primer índice disponible o el final
            miIdx = jugadores.length;
            let nuevoNombre = (typeof nombres !== 'undefined' && nombres[miIdx]) ? nombres[miIdx] : ("Jugador " + (miIdx + 1));
            localStorage.setItem('monopoly_nombre', nuevoNombre);
            console.log("Nuevo jugador registrado como: " + nuevoNombre);
        }

        yaEntro = true;
        let miNombre = localStorage.getItem('monopoly_nombre');
        let jugadorRef = db.ref('salas/' + sala + '/jugadores/' + miIdx);
        
        // Usamos update para mantener datos previos si existían
        jugadorRef.update({
            pos: (encontrado && jugadores[miIdx]) ? jugadores[miIdx].pos : 0,
            dinero: (encontrado && jugadores[miIdx]) ? jugadores[miIdx].dinero : 1000,
            enCarcel: (encontrado && jugadores[miIdx]) ? jugadores[miIdx].enCarcel : 0,
            nombre: miNombre,
            tienePrestamo: (encontrado && jugadores[miIdx]) ? jugadores[miIdx].tienePrestamo : false,
            montoPrestamo: (encontrado && jugadores[miIdx]) ? jugadores[miIdx].montoPrestamo : 0,
            escudo: (encontrado && jugadores[miIdx]) ? jugadores[miIdx].escudo : false,
            quiebraTecnica: (encontrado && jugadores[miIdx]) ? jugadores[miIdx].quiebraTecnica : 0
        }).then(() => {
            localStorage.setItem('monopoly_sala', sala);
            
            // Mensaje en chat
            db.ref('salas/' + sala + '/chat').push({ 
                n: "Sistema", 
                m: miNombre + (encontrado ? " ha vuelto a la partida." : " ha entrado a la sala.") 
            });

            // Solo el primero inicia el clima
            if (miIdx === 0 && !encontrado) {
                db.ref('salas/' + sala + '/turno').set(0);
                if (typeof iniciarRelojClima === 'function') iniciarRelojClima();
            }

            sincronizar();
        }).catch(error => {
            console.error(error);
            yaEntro = false;
            if (btn) btn.disabled = false;
        });
    });
}

        function calcularAlquiler(precioBase, duenoIdx) {
    // 1. Obtener reputación del dueño para el cálculo del precio
    let rep = (window.jugadores && window.jugadores[duenoIdx]) ? (window.jugadores[duenoIdx].reputacion || 50) : 50;
    let multiplicador = 1.0; 

    if (rep >= 90) multiplicador = 1.10;      // Bonus del dueño: +10%
    else if (rep <= 30) multiplicador = 0.85; // Rumores del dueño: -15%

    // 2. Calcular precio base ajustado por reputación
    let precioAjustado = precioBase * multiplicador;

    // 3. Aplicar descuento de aliado si aplica (usando tu nueva función de bonos)
    // Asumimos que miIdx es la variable global del jugador actual
    let bonoAliado = obtenerBonosReputacion(miIdx); 
    
    // 4. Retornar el total final
    return Math.floor(precioAjustado * bonoAliado);
}
        

        function obtenerAlquilerFerrocarril(dueñoIdx, todasLasPropiedades) {
    const indicesTransporte = [8, 24, 26, 27];
    let cantidad = 0;
    
    // Contamos cuántos transportes tiene el dueño
    indicesTransporte.forEach(idx => {
        if (todasLasPropiedades[idx] && todasLasPropiedades[idx].owner === dueñoIdx) {
            cantidad++;
        }
    });

    // Lógica de precios según cantidad
    const tabla = { 1: 100, 2: 150, 3: 250, 4: 300 };
    return tabla[cantidad] || 0;
}

        function pedirPrestamo(monto) {
    db.ref('salas/' + sala + '/jugadores/' + miIdx).once('value', snap => {
        let j = snap.val();

        if (j.tienePrestamo) {

            document.getElementById('modal-text').innerHTML = 
                `<p>No puedes solicitar un nuevo préstamo mientras tengas una deuda activa de <b>$${j.montoPrestamo}</b>.</p>

                `<button class="btn" onclick="abrirBanco()">Volver al Banco</button>`;
            return; // Detiene la ejecución
        }

        // Si no tiene, procede con la transacción
        db.ref('salas/' + sala + '/jugadores/' + miIdx).transaction(player => {
            if (player && !player.tienePrestamo) {
                player.tienePrestamo = true;
                player.montoPrestamo = monto;
                player.dinero = Number(player.dinero) + monto;
                return player;
            }
        }, (error, committed) => {
            if (committed) {
                log(nombres[miIdx] + " obtuvo un préstamo de $" + monto + ".");
                cerrarModal();
            }
        });
    });

  window.proponerVenta = function(pIdx) {
    let sel = document.getElementById('sel-' + pIdx);
    let input = document.getElementById('precio-' + pIdx);
    
    if (!sel || !input) return;

    // Convertimos a entero de forma segura
    let comprador = parseInt(sel.value);
    let precio = parseInt(input.value);

    // Validación de comprador (aseguramos que no sea NaN)
    if (isNaN(comprador)) {
        alert("Error: Debes seleccionar un comprador válido.");
        return;
    }

    // Validación de precio
    if (isNaN(precio) || precio < 100 || precio > 999) {
        document.getElementById('modal-title').innerText = "¡Atención!";
        document.getElementById('modal-text').innerHTML = '<div class="card-property"><p style="text-align: center; padding: 10px;">Por favor, ingresa un precio válido entre 100 y 999.</p></div>';
        document.getElementById('modal-extra').innerHTML = '<button class="btn" onclick="abrirIntercambio()">Volver</button>';
        document.getElementById('modal').style.display = 'block';
        return;
    }

    // Push a Firebase con valores numéricos limpios
    db.ref('salas/' + sala + '/ofertas').push({
        prop: parseInt(pIdx), 
        de: parseInt(miIdx), 
        para: comprador, 
        precio: precio
    });

    log(nombres[miIdx] + " propuso vender " + (mapa[pIdx] ? mapa[pIdx].n : "propiedad") + " a " + nombres[comprador] + " por $" + precio);
    document.getElementById('modal').style.display = 'none';
};

window.confirmarCompra = function(ofertaKey) {
    if (typeof sala === 'undefined' || !sala) return;

    db.ref('salas/' + sala + '/ofertas/' + ofertaKey).once('value', snap => {
        let o = snap.val();
        if (!o) return;

        // Validamos que los datos de la oferta sean números
        let pIdx = parseInt(o.prop);
        let compradorIdx = parseInt(o.para);
        let vendedorIdx = parseInt(o.de);
        let precio = parseInt(o.precio);

        db.ref('salas/' + sala).transaction(data => {
            if (!data || !data.jugadores || !data.jugadores[compradorIdx] || !data.jugadores[vendedorIdx]) return;

            let dineroComprador = Number(data.jugadores[compradorIdx].dinero);

            if (dineroComprador < precio) return;

            // Transferencia
            data.jugadores[compradorIdx].dinero = dineroComprador - precio;
            data.jugadores[vendedorIdx].dinero = Number(data.jugadores[vendedorIdx].dinero) + precio;

            // Actualizar propiedad
            if (!data.propiedades) data.propiedades = {};
            data.propiedades[pIdx] = { owner: compradorIdx };

            return data;
        }, (error, committed) => {
            if (committed) {
                db.ref('salas/' + sala + '/ofertas/' + ofertaKey).remove();
                document.getElementById('modal').style.display = 'none';
                log("¡Venta completada!");
            }
        });
    });
};

       window.confirmarCompra = function(ofertaKey) {
    if (!sala) return;
    
    db.ref('salas/' + sala + '/ofertas/' + ofertaKey).once('value', snap => {
        let o = snap.val();
        if (!o) return;

        db.ref('salas/' + sala).transaction(data => {
            if (!data || !data.jugadores[o.para]) return;
            let precio = Number(o.precio);
            if (Number(data.jugadores[o.para].dinero) < precio) return;

            data.jugadores[o.para].dinero -= precio;
            data.jugadores[o.de].dinero += precio;
            
            if (!data.propiedades) data.propiedades = {};
            data.propiedades[o.prop] = { owner: parseInt(o.para) };
            return data;
        }, (error, committed) => {
            if (committed) {
                db.ref('salas/' + sala + '/ofertas/' + ofertaKey).remove();
                document.getElementById('modal').style.display = 'none';
                log("¡Venta completada!");
            }
        });
    });
};

   function manejarCasilla(pos) {
    // NUEVA VALIDACIÓN: BLOQUEO EN CÁRCEL
    if (pos === 9) {
        log(nombres[miIdx] + " ha caído en la CÁRCEL.");
        
        db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ enCarcel: 2 });

        document.getElementById('modal-title').innerText = "Cárcel";
        document.getElementById('modal-text').innerText = "¡Estás en la cárcel! Tienes derecho a un abogado.";
        document.getElementById('modal-extra').innerHTML = `
            <button class="btn" onclick="pagarFianza()">Pagar Fianza ($200)</button>
            <button class="btn" onclick="intentarHackeo()">Hackear Sistema (50/50)</button>
            <button class="btn" onclick="document.getElementById('modal').style.display = 'none'; pasarTurno();">Quedarse</button>
        `;
        document.getElementById('modal').style.display = 'block';
        turnosSeis = 0;
        return;
    }

    let p = mapa[pos];
    
    // CASO EVENTOS
    if (p.n === "?" || p.n === "ARCA COMUNAL") { 
        ejecutarEvento(p.n); 
        return; 
    }
    
    // CASO PARADA
    if (p.n === "PARADA") {
        db.ref('salas/' + sala + '/impuestosAcumulados').once('value', snap => {
            let acumulado = snap.val() || 0;
            if (acumulado > 0) {
                db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => d + acumulado);
                log(nombres[miIdx] + " llegó a la PARADA y cobró $" + acumulado + " de impuestos.");
                db.ref('salas/' + sala + '/impuestosAcumulados').set(0);
            } else {
                log(nombres[miIdx] + " llegó a la PARADA, pero no había impuestos.");
            }
        });
        return; 
    }
    
    // CASO IMPUESTOS
    if (p.n === "IMPUESTOS") {
        db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => {
            let nuevo = Number(d) - 100;
            setTimeout(() => verificarBancarrota(miIdx, nuevo), 500);
            return nuevo;
        });
        db.ref('salas/' + sala + '/impuestosAcumulados').transaction(a => (a || 0) + 100);
        log(nombres[miIdx] + " pagó impuestos de $100.");
        return;
    }

    // CASO FERROCARRILES (Color crema)
    let g = obtenerGrupo(pos);
    if (g && g.color === "#f5f5dc") {
        db.ref('salas/' + sala).once('value', snap => {
            let data = snap.val();
            let prop = data.propiedades ? data.propiedades[pos] : null;
            
            if (!prop) {
                verPropiedad(pos, true);
            } else if (prop.owner !== miIdx) {
                // Validación de aliado para Ferrocarril
                if (prop.equipo && jugadores[miIdx] && prop.equipo === jugadores[miIdx].equipo) {
                    log("¡Es propiedad de tu aliado " + nombres[prop.owner] + ", estás a salvo!");
                } else {
                    let trans = [8, 24, 26, 27];
                    let count = trans.filter(i => data.propiedades[i] && data.propiedades[i].owner === prop.owner).length;
                    let tabla = { 1: 100, 2: 150, 3: 250, 4: 300 };
                    let alquiler = tabla[count] || 100;
                    procesarPago(miIdx, prop.owner, alquiler);
                    log(nombres[miIdx] + " pagó $" + alquiler + " de transporte a " + nombres[prop.owner]);
                }
            } else {
                verPropiedad(pos, false);
            }
        });
        return;
    }

    // CASO PROPIEDAD NORMAL
    db.ref('salas/' + sala + '/propiedades/' + pos).once('value', snap => {
        let prop = snap.val();
        // Si tiene dueño y no soy yo, verificamos alianza
        if (prop && prop.owner !== miIdx && prop.owner !== undefined) {
            if (prop.equipo && jugadores[miIdx] && prop.equipo === jugadores[miIdx].equipo) {
                log("¡Es propiedad de tu aliado " + nombres[prop.owner] + ", estás a salvo!");
                return;
            }
        }
        // Si no es aliado, procedemos con el flujo normal de compra/pago
        verPropiedad(pos, true);
    });
}

    window.pasarTurno = function() {
    turnosSeis = 0;
    db.ref('salas/' + sala + '/jugadores').once('value', snap => {
        let total = snap.numChildren();
        db.ref('salas/' + sala + '/turno').once('value', tSnap => {
            let t = Number(tSnap.val());
            let siguiente = (t + 1) % total;

            db.ref('salas/' + sala + '/jugadores/' + siguiente).once('value', jSnap => {
                let jugador = jSnap.val();

                if (jugador.enCarcel > 0) {
                    log(nombres[siguiente] + " está en la cárcel y pierde su turno.");
                    // REDUCIMOS el tiempo de cárcel
                    db.ref('salas/' + sala + '/jugadores/' + siguiente).update({ enCarcel: jugador.enCarcel - 1 });
                    
                    // PASAMOS DIRECTO AL SIGUIENTE para que no se quede bloqueado el juego
                    db.ref('salas/' + sala + '/turno').set(siguiente); 
                    // Nota: Aquí no saltamos dos veces, simplemente dejamos que 
                    // el turno avance normalmente al siguiente índice.
                } else {
                    db.ref('salas/' + sala + '/turno').set(siguiente);
                }
            });
        });
    });
};
       window.verPropiedad = function(pos, esCaida = false) {

    let g = obtenerGrupo(pos);

    let iconos = { 8: "https://i.imgur.com/24NquXH.png", 24: "https://i.imgur.com/QMFz9pn.png", 26: "https://i.imgur.com/AINz8Jt.png", 27: "https://i.imgur.com/ZaN9ZUG.png" };

            let notaClima = (multClima !== 1) ? ` <small style="color:red;">(c/clima: $${precioClima})</small>` : "";
            listaAlquileres += `<li>${nivelesNombres[i]}: $${precioNormal}${notaClima}</li>`;
        });
        
        modalTitle.innerText = "Tarjeta de Propiedad";

function mejorar(pos) {

        let miEquipo = jugadores[miIdx].equipo;

                    // Log profesional con distinción de quién invierte
                    if (prop.owner === miIdx) {
                        log(nombres[miIdx] + " mejoró " + mapa[pos].n + " al nivel " + (prop.nivel + 1));
                    } else {
                        log(nombres[miIdx] + " invirtió en una propiedad del Equipo " + miEquipo + ": " + mapa[pos].n + " ahora es nivel " + (prop.nivel + 1));
                    }
                    
                    cerrarModal();
                    return d - 50;
                } else {
                    alert("No tienes suficiente dinero.");
                    return d;
                }
            });
        }
    });
}
    
    window.tirarDado = function() {
    if(miIdx === -1) return;
    
    db.ref('salas/' + sala).once('value', snap => {
        let s = snap.val(); 
        if(!s || s.turno !== miIdx) return; // Solo el jugador del turno tira
        
        // --- GESTIÓN DE CÁRCEL ---
        if (s.jugadores[miIdx].enCarcel > 0) {
            log(nombres[miIdx] + " está en la cárcel y no puede moverse.");
            // Si quieres que el jugador pueda salir sacando un 6, puedes añadirlo aquí.
            // Por ahora, solo pasa turno tras el log.
            pasarTurno(); 
            return;
        }
        
        // 1. Lógica de clima
        if (s.clima === undefined) {
            let climaInicial = Math.floor(Math.random() * climas.length);
            db.ref('salas/' + sala + '/clima').set(climaInicial);
        }

        // 2. Cálculo del dado
        let dado = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dado-valor').innerText = dado;
        let contadorActual = s.jugadores[miIdx].seisSeguidos || 0;
        let nuevoContador = (dado === 6) ? contadorActual + 1 : 0;

        // 3. Movimiento
        let posActual = Number(s.jugadores[miIdx].pos);
        let nuevaPos = (posActual + dado) % mapa.length;
        
        // CORRECCIÓN: Aquí es donde detectamos si cruzó la salida
        if (nuevaPos < posActual) { 
            db.ref('salas/'+sala+'/jugadores/'+miIdx+'/dinero').transaction(d => (d || 0) + 100); 
            log(nombres[miIdx] + " pasó por SALIDA y cobró $100."); 
        }

        // 4. Lógica de Penalización o Movimiento
        if (nuevoContador === 3) {
            log("¡ACUSACIÓN DE FRAUDE! " + nombres[miIdx] + " sacó tres 6 seguidos.");
            db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ 
                pos: 9, // Enviamos a la casilla 9 (Cárcel)
                enCarcel: 2, 
                seisSeguidos: 0 
            });
            pasarTurno(); 
        } else {
            db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ 
                pos: nuevaPos, 
                seisSeguidos: nuevoContador 
            });

            // Si saca 6, repite turno. Si no, pasa al siguiente.
            if (dado === 6) {
                log("¡Sacaste un 6! Tienes turno extra.");
            } else {
                pasarTurno();
            }
            
            // Disparamos la lógica de la casilla (aquí es donde se activa el modal de la cárcel)
            setTimeout(() => manejarCasilla(nuevaPos), 600);
        }
    }); 
}
                                                                                                       
    function pagarPrestamo() { db.ref('salas/' + sala + '/jugadores/' + miIdx).once('value', snap => { let j = snap.val(); if (j.tienePrestamo) { if (j.dinero >= j.montoPrestamo) { db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ dinero: firebase.database.ServerValue.increment(-j.montoPrestamo), tienePrestamo: false, montoPrestamo: 0 }); log(nombres[miIdx] + " liquidó su préstamo."); } else { document.getElementById('modal-title').innerText = "Fondos insuficientes"; document.getElementById('modal-text').innerHTML = `<div class="empty-debt">No tienes suficiente dinero para pagar el préstamo.</div>`; document.getElementById('modal-extra').innerHTML = ""; document.getElementById('modal').style.display = 'block'; } } else { document.getElementById('modal-title').innerText = "Banco"; document.getElementById('modal-text').innerHTML = `<div class="empty-debt">No tienes préstamos pendientes.</div>`; document.getElementById('modal-extra').innerHTML = ""; document.getElementById('modal').style.display = 'block'; } }); }
    function verSaldos() { db.ref('salas/' + sala + '/jugadores').once('value', snap => { let txt = ""; snap.forEach(c => { txt += nombres[parseInt(c.key)] + ": $" + c.val().dinero + "<br>"; }); document.getElementById('modal-title').innerText = "Saldos"; document.getElementById('modal-text').innerHTML = txt; document.getElementById('modal').style.display = 'block'; }); }
    function enviarChat() { 
    let input = document.getElementById('chat-msg');
    let msg = input.value; 
    if (msg.trim() === "") return; // No enviar si está vacío

    // Obtenemos la hora actual (HH:MM)
    let ahora = new Date();
    let hora = ahora.getHours().toString().padStart(2, '0');
    let minutos = ahora.getMinutes().toString().padStart(2, '0');
    let marcaTiempo = hora + ":" + minutos;
    
    // Enviamos el mensaje con la hora (t)
    db.ref('salas/' + sala + '/chat').push({ 
        n: nombres[miIdx], 
        m: msg,
        t: marcaTiempo 
    }); 
    
    input.value = ""; // Limpiar input
}
    window.sincronizar = function() {
    // PROTECCIÓN TOTAL: Si no hemos entrado, no intentamos sincronizar nada.
    if (!yaEntro || !sala) {
        console.log("Sincronización en espera: Usuario no ha entrado a la sala.");
        return;
    }

    // 1. Sincronización del Chat
    db.ref('salas/' + sala + '/chat').on('value', snap => {
        if (!yaEntro) return; 
        let chatLog = document.getElementById('chat-log');
        if (!chatLog) return;
        chatLog.innerHTML = ""; 
        snap.forEach(msgSnap => {
            let m = msgSnap.val();
            let hora = m.t ? `<small style="color:gray;">[${m.t}]</small> ` : "";
            chatLog.innerHTML += `<div>${hora}<b>${m.n}:</b> ${m.m}</div>`;
        });
        chatLog.scrollTop = chatLog.scrollHeight;
    });

    // 2. Sincronización del Juego
    db.ref('salas/' + sala).on('value', snap => { 
        if (!yaEntro) return; 
        let s = snap.val(); 
        if(!s) return; 

        // Actualizar dinero
        if (s.jugadores && s.jugadores[miIdx]) {
            document.getElementById('dinero-mio').innerText = s.jugadores[miIdx].dinero;
        }

        // Actualizar Turnos
        let turnoText = document.getElementById('turno-text');
        if (turnoText && s.turno !== undefined && typeof nombres !== 'undefined') {
            turnoText.innerText = "Turno: " + (nombres[s.turno] || "Jugador " + (s.turno + 1));
        }

        // Actualizar Clima
        if(s.clima !== undefined && typeof climas !== 'undefined') { 
            let c = climas[s.clima]; 
            document.getElementById('clima-display').innerText = "Estación: " + c.n; 
        }

        // Actualizar Fichas de jugadores
        if (s.jugadores) {
            s.jugadores.forEach((j, i) => { 
                let el = document.getElementById('p' + i); 
                if (el && j) {
                    el.style.display = 'block'; 
                    let cell = document.getElementById('cell-' + j.pos); 
                    if (cell) {
                        el.style.left = (cell.offsetLeft + 30) + 'px'; 
                        el.style.top = (cell.offsetTop + 30) + 'px';
                    }
                }
            });
        }

        // Actualizar Propiedades
        if(s.propiedades) { 
            Object.keys(s.propiedades).forEach(pos => { 
                let cell = document.getElementById('cell-' + pos);
                if(cell) {
                    if (typeof colores !== 'undefined') {
                        cell.style.backgroundColor = s.propiedades[pos].hipotecada ? "#ccc" : colores[s.propiedades[pos].owner];
                    }
                    let hc = cell.querySelector('.house-container'); 
                    if (hc) {
                        hc.innerHTML = "";
                        let nivel = s.propiedades[pos].nivel || 0;
                        if(nivel > 0 && nivel < 5) { for(let i=0; i<nivel; i++) { let h = document.createElement('div'); h.className = 'house'; hc.appendChild(h); } }
                        else if(nivel === 5) { let h = document.createElement('div'); h.className = 'hotel'; hc.appendChild(h); }
                    }
                }
            }); 
        }

        // Actualizar Log
        if(s.log) { 
            let h = ""; Object.values(s.log).forEach(l => h += l + "<br>"); 
            let logEl = document.getElementById('log');
            if(logEl) logEl.innerHTML = h; 
        }

        // Misiones
        if (s.jugadores && s.jugadores[miIdx]) {
            if (typeof verificarMisionCajaFuerte === 'function') verificarMisionCajaFuerte(miIdx, s.jugadores[miIdx].dinero);
            if (s.jugadores[miIdx].ultimaMision) {
                let m = s.jugadores[miIdx].ultimaMision;
                const mensajes = {
                    "negociador": "¡Has ganado $400 por tu primer intercambio!",
                    "inversor": "¡Felicidades! Has ganado $200 por ser un Inversor Inicial.",
                    "coleccionista": "¡Felicidades! Has ganado $300 por completar un set de color.",
                    "cajafuerte": "¡Felicidades! Has acumulado $2,000. ¡Un premio de $650 irá directo a tu caja fuerte!",
                    "intocable": "¡El Intocable! Otros jugadores han caído 5 veces en tus propiedades. ¡Has ganado $400!",
                    "renovador": "¡Excelente constructor! Has construido 5 casas en total. ¡Has ganado $500!",
                    "monopolioTotal": "¡INCREÍBLE! Has conseguido el Monopolio Total. ¡Premio de $1,500!"
                };
                if (mensajes[m]) {
                    if (typeof mostrarNotificacionMision === 'function') mostrarNotificacionMision(mensajes[m]);
                    db.ref('salas/' + sala + '/jugadores/' + miIdx + '/ultimaMision').remove();
                }
            }
        }
    });
};

// 2. EL BLOQUE DE CREACIÓN DEL TABLERO
window.addEventListener('DOMContentLoaded', () => {
    const board = document.getElementById('board');
    if (!board) return;

    mapa.forEach((m, i) => { 
        const d = document.createElement('div'); 
        d.className = 'cell'; 
        d.id = 'cell-' + i; 
        d.onclick = () => verPropiedad(i);
        
        let g = obtenerGrupo(i);
        
        if (g && g.color === "#f5f5dc") {
            d.style.border = "3px solid #f5f5dc"; 
            d.style.backgroundColor = "#fffef0";
        } else if (g) {
            d.innerHTML = `<div class="strip" style="background: ${g.color}"></div>`;
        }
        
        // Mantenemos la lógica original de concatenar el contenido
        d.innerHTML += `<div class="contenido" style="font-size: 7px; color: #c71585;">
                            ${m.n}<br>
                            ${m.p > 0 ? '$' + m.p : ''}
                        </div>`;
        board.appendChild(d);
    });
});
