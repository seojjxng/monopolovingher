<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Naeun Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 1000px; align-items: flex-start; }
        .game-column, .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .sidebar { width: 320px; }
        .board-wrapper, .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .actions-divider { width: 100%; height: 2px; background: #ffccd5; margin: 15px 0; border-radius: 1px; }
        .actions-bar { display: flex; gap: 10px; justify-content: center; padding: 10px; background: #fff0f9; border: 2px solid #ffccd5; border-radius: 20px; margin-top: 10px; }
        .mode-panel { background: #fff0f9; padding: 15px; border-radius: 20px; border: 2px solid #ffccd5; text-align: center; }
        .board { 
    display: grid; 
    /* Usamos 'fr' (fracción) para que se adapten al espacio disponible */
    grid-template-columns: repeat(8, 1fr); 
    grid-template-rows: repeat(8, 1fr); 
    gap: 2px; /* Espacio reducido entre celdas */
    background: #ffccd5; 
    padding: 5px; 
    border-radius: 20px; 
    width: 600px; 
    height: 600px; /* Definimos altura igual al ancho para que sea cuadrado */
    position: relative;
    box-sizing: border-box;
}
    .celda-juego { 
    background: white; 
    border: 1px solid #ffccd5; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    font-size: 8px; /* Mantén este tamaño para que quepa el texto */
    font-weight: bold; 
    color: #c71585; 
    text-align: center; 
    position: relative; 
    cursor: pointer;
    overflow: hidden;
}
        #banco-container { display: flex; gap: 5px; justify-content: center; }
        #modo-2v2-container { margin-top: 10px; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 12px; }
        #banco-container .btn { width: auto; flex: 1; font-size: 10px; padding: 8px 5px; }
        #log, #chat-log { height: 125px !important; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; margin: 5px 0 15px 0; width: 100%; }
        .input-field { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        .center-zone { grid-column: 3 / 7; grid-row: 3 / 7; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; border-radius: 15px; z-index: 999; position: relative; pointer-events: auto; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { width: 90%; max-width: 400px; background: #ffe4e9; padding: 30px; border: 3px solid #ff80bf; border-radius: 20px; text-align: center; position: relative; }
        .token { width: 25px; height: 25px; position: absolute; z-index: 10; pointer-events: none; }
        .board div[id^="cell-"] { background: #ffffff; border-left: 8px solid #ffccd5; border-top: 1px solid #ffccd5; border-right: 1px solid #ffccd5; border-bottom: 1px solid #ffccd5; border-radius: 4px; z-index: 1; }
        .reputacion-container { width: 100px; height: 10px; background: #ffe0f0; border-radius: 10px; border: 1px solid #ff59aa; overflow: hidden; margin: 5px 0; }
        .reputacion-bar { height: 100%; width: 50%; background: #ff59aa; transition: width 0.5s ease-in-out; }
        #lista-misiones { list-style: none; padding: 0; text-align: left; max-height: 300px; overflow-y: auto; font-size: 13px; }
        #cell-0 { grid-column: 8; grid-row: 8; } #cell-1 { grid-column: 7; grid-row: 8; } #cell-2 { grid-column: 6; grid-row: 8; } #cell-3 { grid-column: 5; grid-row: 8; } #cell-4 { grid-column: 4; grid-row: 8; } #cell-5 { grid-column: 3; grid-row: 8; } #cell-6 { grid-column: 2; grid-row: 8; } #cell-7 { grid-column: 1; grid-row: 8; }
        #cell-8 { grid-column: 1; grid-row: 7; } #cell-9 { grid-column: 1; grid-row: 6; } #cell-10 { grid-column: 1; grid-row: 5; } #cell-11 { grid-column: 1; grid-row: 4; } #cell-12 { grid-column: 1; grid-row: 3; } #cell-13 { grid-column: 1; grid-row: 2; } #cell-14 { grid-column: 1; grid-row: 1; }
        #cell-15 { grid-column: 2; grid-row: 1; } #cell-16 { grid-column: 3; grid-row: 1; } #cell-17 { grid-column: 4; grid-row: 1; } #cell-18 { grid-column: 5; grid-row: 1; } #cell-19 { grid-column: 6; grid-row: 1; } #cell-20 { grid-column: 7; grid-row: 1; } #cell-21 { grid-column: 8; grid-row: 1; }
        #cell-22 { grid-column: 8; grid-row: 2; } #cell-23 { grid-column: 8; grid-row: 3; } #cell-24 { grid-column: 8; grid-row: 4; } #cell-25 { grid-column: 8; grid-row: 5; } #cell-26 { grid-column: 8; grid-row: 6; } #cell-27 { grid-column: 8; grid-row: 7; }
    </style>
</head>
<body>
    <body>
    <div class="container">
        <div class="game-column">
            <div class="board-wrapper">
                <div class="board" id="board">
                    <div class="center-zone">
                        <h3>Monopoly Naeun Town</h3>
                        <div id="turno-text">Esperando jugadores...</div>
                    </div>
                </div>
            </div>
            <div class="actions-bar" id="banco-container">
                <button class="btn" onclick="abrirBanco()">🏦 Banco</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <strong>Unirse a Sala</strong>
                <input type="text" id="sala-id" class="input-field" placeholder="Nombre de la sala">
                <button class="btn" onclick="unirse()">Entrar</button>
                <div id="log"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
    <script src="script.js"></script>
</body>
</html>
