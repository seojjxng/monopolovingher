<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Naeun Town</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="main-column">
        <div class="board" id="board">
            <div class="center-zone" id="center-zone">
                <div class="reputacion-label" onclick="mostrarAvisoReputacion()">Reputación</div>
                <div id="clima-display">Clima: -</div>
                <div class="dice-container" onclick="lanzarDado3D()">
                    <div id="dice" class="dice">
                        <div class="face front"><div class="dot show" style="grid-area: 2 / 2;"></div></div>
                        <div class="face back"><div class="dot show" style="grid-area: 1 / 1;"></div></div>
                    </div>
                </div>
                <div class="saldo-container">Saldo: $<span id="dinero-mio">1000</span></div>
                <button class="btn-misiones" onclick="window.abrirModalMisiones()">Ver Misiones</button>
            </div>
        </div>
        
        <div class="actions-wrapper">
            <div class="actions-bar">
                <button class="btn-action">🏦 Banco</button>
                <button class="btn-action">💳 Pagar</button>
                <button class="btn-action">🤝 Intercambio</button>
            </div>
        </div>
    </div>
    
    <div class="sidebar">
        <div class="panel">
            <strong>Unirse a Sala</strong>
            <input type="text" id="sala-id" class="input-field" placeholder="Nombre de la sala">
            <button class="btn-sidebar" onclick="window.unirse()">Entrar</button>
            <hr style="border:0; border-top:1px solid #ffccd5; margin:10px 0;">
            <strong>Historial</strong>
            <div id="log" class="scroll-box"></div>
            <strong>Chat</strong>
            <div id="chat-log" class="scroll-box"></div>
            <input type="text" id="chat-msg" class="input-field" placeholder="Mensaje...">
            <button class="btn-sidebar" onclick="window.enviarMensaje()">Enviar</button>
        </div>
    </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
