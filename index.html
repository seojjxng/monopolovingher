<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Naeun Town</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff0f3; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; min-height: 100vh; }

.container { display: flex; gap: 15px; justify-content: center; align-items: flex-start; width: 100%; max-width: 950px; }
.main-column { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 600px; flex-shrink: 0; }

/* TABLERO */
.board { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); gap: 2px; background: #ffccd5; padding: 4px; border-radius: 10px; width: 600px; height: 600px; position: relative; }
.celda-juego { background: #ffffff; border: 1px solid #ffccd5; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; width: 100%; height: 100%; font-size: 7px; }
.celda-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; text-align: center; padding: 2px; }
.strip { width: 100%; height: 20%; border-bottom: 2px solid #ffccd5; }
.nombre { font-size: 8px; font-weight: bold; line-height: 1; }
.precio { font-size: 7px; color: #ff59aa; font-weight: bold; }
.interrogacion { font-size: 24px; font-weight: bold; color: #ff59aa; }

/* CENTER ZONE */
.center-zone { grid-column: 3 / 7; grid-row: 3 / 7; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; border-radius: 10px; gap: 5px; padding: 10px; }

.reputacion-label { cursor: pointer; font-size: 11px; font-weight: bold; color: #ff59aa; }
.estrellas-container { display: flex; gap: 4px; justify-content: center; margin: 5px 0; }
.estrella { font-size: 20px; color: #ffdceb; }
.estrella.activa { color: #ff59aa; }

#clima-display { font-size: 12px; color: #ff59aa; font-weight: bold; margin: 5px 0; }

/* DADO */
.dice-container { perspective: 400px; width: 40px; height: 40px; cursor: pointer; margin: 10px 0; }
.dice { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1s ease-out; }
.face { position: absolute; width: 40px; height: 40px; background: white; border: 1px solid #ff80bf; border-radius: 6px; display: grid; grid-template-columns: repeat(3, 1fr); padding: 5px; backface-visibility: hidden; }
.dot { width: 8px; height: 8px; background: #ff59aa; border-radius: 50%; visibility: hidden; }
.show { visibility: visible; }
.front { transform: translateZ(20px); }
.back { transform: rotateY(180deg) translateZ(20px); }
.right { transform: rotateY(90deg) translateZ(20px); }
.left { transform: rotateY(-90deg) translateZ(20px); }
.top { transform: rotateX(90deg) translateZ(20px); }
.bottom { transform: rotateX(-90deg) translateZ(20px); }
@keyframes girarDado { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(720deg) rotateY(720deg); } }
.rolling { animation: girarDado 0.6s ease-out forwards; }

/* SALDO Y MISIONES */
.saldo-container { background: #fff5f7; padding: 6px 15px; border-radius: 20px; border: 1px solid #ff80bf; color: #c71585; font-weight: bold; display: flex; align-items: center; gap: 8px; }
.moneda-icono { width: 20px; height: 20px; background: #ff59aa; border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; }
.btn-misiones { background: linear-gradient(135deg, #ff80bf, #ff59aa); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }

/* SIDEBAR */
.sidebar { 
    width: 300px; 
    /* Cambiamos height fijo por min-height para que crezca si el contenido lo necesita */
    min-height: 600px; 
    /* Aseguramos que se comporte bien dentro del contenedor principal */
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
    /* Permite que no se contraiga si los elementos internos ocupan más espacio */
    flex-shrink: 0; 
}
.panel { 
    background: #ffffff; 
    padding: 15px; 
    border-radius: 15px; 
    border: 2px solid #ffccd5; 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
    /* Cambiamos height fijo por flex-grow para que se ajuste al contenido */
    flex-grow: 1; 
    /* Cambiamos overflow hidden por visible para que no corte elementos */
    overflow: visible; 
    /* Añadimos min-height para que no se colapse */
    min-height: 400px; 
}
.scroll-box { 
    /* Cambiamos height: 100% (que causa conflictos) por flex: 1 */
    flex: 1; 
    
    /* Mantenemos el estilo visual */
    background: #fff5f7; 
    border: 1px solid #ffccd5; 
    border-radius: 8px; 
    padding: 8px; 
    
    /* Mantenemos la capacidad de hacer scroll y el tamaño de fuente */
    overflow-y: auto; 
    font-size: 12px; 
    
    /* Aseguramos que no se comprima a 0 si el padre es muy pequeño */
    min-height: 80px; 
}
.input-field { padding: 8px; border: 1px solid #ffccd5; border-radius: 8px; width: 100%; }
.btn-sidebar { padding: 10px; border: none; border-radius: 10px; background: #ffccd5; color: #c71585; font-weight: bold; cursor: pointer; }

/* ACCIONES */
.actions-wrapper { width: 600px; }
.actions-bar { display: flex; justify-content: space-between; gap: 10px; background: #ffffff; padding: 10px; border-radius: 15px; border: 2px solid #ffccd5; }
.btn-action { flex: 1; padding: 10px; border: 1px solid #ffccd5; border-radius: 10px; background: #fff0f3; color: #ff59aa; font-weight: bold; cursor: pointer; }
        
        #cell-0 { grid-column: 8; grid-row: 8; } #cell-1 { grid-column: 7; grid-row: 8; } #cell-2 { grid-column: 6; grid-row: 8; } #cell-3 { grid-column: 5; grid-row: 8; } #cell-4 { grid-column: 4; grid-row: 8; } #cell-5 { grid-column: 3; grid-row: 8; } #cell-6 { grid-column: 2; grid-row: 8; } #cell-7 { grid-column: 1; grid-row: 8; }
        #cell-8 { grid-column: 1; grid-row: 7; } #cell-9 { grid-column: 1; grid-row: 6; } #cell-10 { grid-column: 1; grid-row: 5; } #cell-11 { grid-column: 1; grid-row: 4; } #cell-12 { grid-column: 1; grid-row: 3; } #cell-13 { grid-column: 1; grid-row: 2; } #cell-14 { grid-column: 1; grid-row: 1; }
        #cell-15 { grid-column: 2; grid-row: 1; } #cell-16 { grid-column: 3; grid-row: 1; } #cell-17 { grid-column: 4; grid-row: 1; } #cell-18 { grid-column: 5; grid-row: 1; } #cell-19 { grid-column: 6; grid-row: 1; } #cell-20 { grid-column: 7; grid-row: 1; } #cell-21 { grid-column: 8; grid-row: 1; }
        #cell-22 { grid-column: 8; grid-row: 2; } #cell-23 { grid-column: 8; grid-row: 3; } #cell-24 { grid-column: 8; grid-row: 4; } #cell-25 { grid-column: 8; grid-row: 5; } #cell-26 { grid-column: 8; grid-row: 6; } #cell-27 { grid-column: 8; grid-row: 7; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-column">
        <div class="board" id="board">
            <div class="center-zone" id="center-zone">
                <div class="reputacion-label" onclick="mostrarAvisoReputacion()">Reputación</div>
                <div class="estrellas-container">
                    <span class="estrella" id="star-1">★</span>
                    <span class="estrella" id="star-2">★</span>
                    <span class="estrella" id="star-3">★</span>
                    <span class="estrella" id="star-4">★</span>
                    <span class="estrella" id="star-5">★</span>
                </div>
                <div id="clima-display">Clima: -</div>
                <div class="dice-container" onclick="lanzarDado3D()">
                    <div id="dice" class="dice">
                        <div class="face front"><div class="dot show" style="grid-area: 2 / 2;"></div></div>
                        <div class="face back"><div class="dot show" style="grid-area: 1 / 1;"></div><div class="dot show" style="grid-area: 1 / 3;"></div><div class="dot show" style="grid-area: 2 / 1;"></div><div class="dot show" style="grid-area: 2 / 3;"></div><div class="dot show" style="grid-area: 3 / 1;"></div><div class="dot show" style="grid-area: 3 / 3;"></div></div>
                        <div class="face right"><div class="dot show" style="grid-area: 1 / 1;"></div><div class="dot show" style="grid-area: 3 / 3;"></div></div>
                        <div class="face left"><div class="dot show" style="grid-area: 1 / 1;"></div><div class="dot show" style="grid-area: 1 / 3;"></div><div class="dot show" style="grid-area: 2 / 2;"></div><div class="dot show" style="grid-area: 3 / 1;"></div><div class="dot show" style="grid-area: 3 / 3;"></div></div>
                        <div class="face top"><div class="dot show" style="grid-area: 1 / 1;"></div><div class="dot show" style="grid-area: 2 / 2;"></div><div class="dot show" style="grid-area: 3 / 3;"></div></div>
                        <div class="face bottom"><div class="dot show" style="grid-area: 1 / 1;"></div><div class="dot show" style="grid-area: 1 / 3;"></div><div class="dot show" style="grid-area: 3 / 1;"></div><div class="dot show" style="grid-area: 3 / 3;"></div></div>
                    </div>
                </div>
                <div class="saldo-container">
                    <div class="moneda-icono">$</div> 
                    Saldo: $<span id="dinero-mio">1000</span>
                </div>
                <button class="btn-misiones" onclick="window.abrirModalMisiones()">Ver Misiones</button>
            </div>
        </div>
        <div class="actions-wrapper">
            <div class="actions-bar" id="banco-container">
                <button class="btn-action">🏦 Banco</button>
                <button class="btn-action">💳 Pagar</button>
                <button class="btn-action">💰 Saldos</button>
                <button class="btn-action">🤝 Intercambio</button>
            </div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Unirse a Sala</strong>
            <input type="text" id="sala-id" class="input-field" placeholder="Nombre de la sala">
            <button class="btn-sidebar" onclick="window.unirse()">Entrar</button>
            <hr style="width:100%; border:0; border-top:1px solid #ffccd5; margin:10px 0;">
            <strong>Historial</strong>
            <div id="log" class="scroll-box"></div>
            <strong>Chat</strong>
            <div id="chat-log" class="scroll-box"></div>
            <input type="text" id="chat-msg" class="input-field" placeholder="Mensaje...">
            <button class="btn-sidebar" onclick="window.enviarMensaje()">Enviar</button>
        </div>
    </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
