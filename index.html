<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Naeun Town</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .sidebar { display: flex; flex-direction: column; height: 100%; }
        .panel { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        .scroll-box { flex-grow: 1; overflow-y: auto; min-height: 100px; }
    </style>
</head>
<body>

<div id="modal" class="modal-hidden">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modal-title">Título</span>
            <button class="btn-cerrar" onclick="window.cerrarModal()">X</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
    </div>
</div>

<div class="game-layout">
    <div class="main-column">
        <div class="board" id="board">
            <div id="cell-0" class="celda-juego"></div>
            <div id="cell-1" class="celda-juego"></div>
            <div id="cell-2" class="celda-juego"></div>
            <div id="cell-3" class="celda-juego"></div>
            <div id="cell-4" class="celda-juego"></div>
            <div id="cell-5" class="celda-juego"></div>
            <div id="cell-6" class="celda-juego"></div>
            <div id="cell-7" class="celda-juego"></div>
            <div id="cell-8" class="celda-juego"></div>
            <div id="cell-9" class="celda-juego"></div>
            <div id="cell-10" class="celda-juego"></div>
            <div id="cell-11" class="celda-juego"></div>
            <div id="cell-12" class="celda-juego"></div>
            <div id="cell-13" class="celda-juego"></div>
            <div id="cell-14" class="celda-juego"></div>
            <div id="cell-15" class="celda-juego"></div>
            <div id="cell-16" class="celda-juego"></div>
            <div id="cell-17" class="celda-juego"></div>
            <div id="cell-18" class="celda-juego"></div>
            <div id="cell-19" class="celda-juego"></div>
            <div id="cell-20" class="celda-juego"></div>
            <div id="cell-21" class="celda-juego"></div>
            <div id="cell-22" class="celda-juego"></div>
            <div id="cell-23" class="celda-juego"></div>
            <div id="cell-24" class="celda-juego"></div>
            <div id="cell-25" class="celda-juego"></div>
            <div id="cell-26" class="celda-juego"></div>
            <div id="cell-27" class="celda-juego"></div>

            <div class="center-zone" id="center-zone">
                <div class="reputacion-label" onclick="mostrarAvisoReputacion()">Reputación</div>
                <div class="estrellas-container" data-reputacion">
                    <span class="estrella" id="star-1">★</span>
                    <span class="estrella" id="star-2">★</span>
                    <span class="estrella" id="star-3">★</span>
                    <span class="estrella" id="star-4">★</span>
                    <span class="estrella" id="star-5">★</span>
                </div>
                
                <div id="clima-display">Clima: -</div>
                <div id="turno-display" style="margin: 0px 0 5px 0; font-size: 0.9em; font-weight: bold; color: #ff59aa;">Turno: Esperando...</div>
                
                <div class="dice-container" id="dice-container">
                    <div id="dice" class="dice">
                        <div class="face front"><div class="dot show" style="grid-area: 2 / 2;"></div></div>
                        <div class="face back"><div class="dot show" style="grid-area: 1 / 1;"></div><div class="dot show" style="grid-area: 1 / 3;"></div><div class="dot show" style="grid-area: 2 / 1;"></div><div class="dot show" style="grid-area: 2 / 3;"></div><div class="dot show" style="grid-area: 3 / 1;"></div><div class="dot show" style="grid-area: 3 / 3;"></div></div>
                        <div class="face right"><div class="dot show" style="grid-area: 1 / 1;"></div><div class="dot show" style="grid-area: 3 / 3;"></div></div>
                        <div class="face left"><div class="dot show" style="grid-area: 1 / 1;"></div><div class="dot show" style="grid-area: 1 / 3;"></div><div class="dot show" style="grid-area: 2 / 2;"></div><div class="dot show" style="grid-area: 3 / 1;"></div><div class="dot show" style="grid-area: 3 / 3;"></div></div>
                        <div class="face top"><div class="dot show" style="grid-area: 1 / 1;"></div><div class="dot show" style="grid-area: 2 / 2;"></div><div class="dot show" style="grid-area: 3 / 3;"></div></div>
                        <div class="face bottom"><div class="dot show" style="grid-area: 1 / 1;"></div><div class="dot show" style="grid-area: 1 / 3;"></div><div class="dot show" style="grid-area: 3 / 1;"></div><div class="dot show" style="grid-area: 3 / 3;"></div></div>
                    </div>
                </div>
                
                <div class="saldo-container" style="margin-top: -15px !important; position: relative;">
                    <div class="moneda-icono">$</div> 
                    Saldo: $<span id="dinero-mio">0</span>
                </div>
                <button class="btn-misiones" onclick="window.abrirModalMisiones()">Ver Misiones</button>
            </div>
        </div>
        
        <div class="actions-wrapper">
            <div class="actions-bar">
                <button class="btn-accion" onclick="window.abrirBanco()">🏦 Banco</button>
                <button class="btn-accion" onclick="window.abrirPagar()">💳 Pagar</button>
                <button class="btn-accion" onclick="window.verSaldos()">💰 Saldos</button>
                <button class="btn-accion" onclick="window.abrirIntercambio()">🤝 Intercambio</button>
            </div>
        </div>
    </div>
    
    <div class="sidebar-wrapper">
        <div class="sidebar">
    <div class="panel">
        <strong>Unirse a Sala</strong>
        <input type="text" id="sala-id" class="input-field" placeholder="Nombre de la sala">
        <button class="btn-sidebar" style="background: #ff80bf; color: white; margin-bottom: 8px; width: 100%; padding: 10px;" onclick="window.validarYConectar()">Entrar al Juego</button>
        
        <hr style="border:0; border-top:1px solid #ffccd5; margin:10px 0;">
        <strong>Historial</strong>
        <div id="game-log" class="scroll-box"></div>
        <strong>Chat</strong>
        <div id="chat-log" class="scroll-box"></div>
        <input type="text" id="chat-msg" class="input-field" placeholder="Mensaje...">
    </div>
    
    <div class="actions-bar" style="width: 100%; display: flex; flex-direction: column; gap: 8px; margin-top: 0;">
        <button class="btn-accion" style="width: 100%; color: white" onclick="window.mostrarAviso2v2()">Modo 2v2</button>
        
        <button id="btn-iniciar-partida" class="btn-accion" style="width: 100%; padding: 12px; border: none; cursor: pointer; border-radius: 12px; display: none; align-items: center; justify-content: center; gap: 8px;" onclick="window.iniciarPartida()">
            <span style="width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid white; display: inline-block;"></span>
            Iniciar Partida
        </button>
          </div>
       </div>
    </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
