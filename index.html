    <style>
        * { box-sizing: border-box; }
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
    
.container { display: flex; gap: 25px; width: 1000px; align-items: flex-start; }
    
.game-column, .sidebar { display: flex; flex-direction: column; gap: 15px; }
    
.sidebar { width: 320px; }
    
.board-wrapper, .panel { 
    background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; 
}
.actions-divider {
    width: 100%;
    height: 2px;
    background: #ffccd5;
    margin: 15px 0;
    border-radius: 1px;
}

/* Contenedor de botones fuera del tablero */
.actions-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 10px;
    background: #fff0f9;
    border: 2px solid #ffccd5;
    border-radius: 20px;
    margin-top: 10px;
}

/* Panel específico para el modo 2v2 */
.mode-panel {
    background: #fff0f9;
    padding: 15px;
    border-radius: 20px;
    border: 2px solid #ffccd5;
    text-align: center;
}

/* Tablero */
.board { 
    display: grid; 
    grid-template-columns: repeat(8, 70px); 
    grid-template-rows: repeat(8, 70px);    
    gap: 2px; 
    background: #ffccd5; 
    padding: 5px; 
    width: 100%; 
    max-width: 600px; 
    aspect-ratio: 1 / 1;
    position: relative; /* Clave para el control de hijos */
}
    
/* Contenedores inferiores */
#banco-container { display: flex; gap: 5px; justify-content: center; }
#modo-2v2-container { margin-top: 10px; }

/* Botones - Ajustados para que no se deformen */
.btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 12px; }
#banco-container .btn { width: auto; flex: 1; font-size: 10px; padding: 8px 5px; }
    
/* Ajustes críticos para Chat y Log */
#log, #chat-log { 
    height: 125px !important; 
    overflow-y: auto; 
    font-size: 11px; 
    color: #c71585; 
    padding: 10px; 
    background: white; 
    border-radius: 10px; 
    border: 1px solid #ffccd5; 
    margin: 5px 0 15px 0; 
    width: 100%;
}

.input-field { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
    
/* Asegurar que la zona central tenga espacio */
.center-zone { 
    grid-column: 3 / 7; 
    grid-row: 3 / 7; 
    background: #fff5f7; 
    border: 3px dashed #ff80bf; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    padding: 10px;
    border-radius: 15px; 
    z-index: 999; /* Mucho más alto para que nada lo tape */
    position: relative;
    pointer-events: auto; /* Asegura que los clicks funcionen */
}
    
/* Modales - Centrado y Estandarizado */
#modal {
    display: none; 
    position: fixed; 
    top: 0; left: 0; 
    width: 100%; height: 100%; 
    background: rgba(0,0,0,0.7); 
    z-index: 10000; 
    justify-content: center; 
    align-items: center; 
}
.modal-content { 
    width: 90%; 
    max-width: 400px; 
    background: #ffe4e9; 
    padding: 30px; 
    border: 3px solid #ff80bf; 
    border-radius: 20px; 
    text-align: center; 
    position: relative; 
}
.btn-cerrar-x {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 35px;
    cursor: pointer;
    color: #c71585;
}
    
.token { width: 25px; height: 25px; position: absolute; z-index: 10; pointer-events: none; }
.board div[id^="cell-"] {
    background: #ffffff;
    border-left: 8px solid #ffccd5; /* Tu efecto de franja */
    border-top: 1px solid #ffccd5;
    border-right: 1px solid #ffccd5;
    border-bottom: 1px solid #ffccd5;
    border-radius: 4px;
    z-index: 1; /* Detrás de la zona central */
}

.reputacion-bar { height: 100%; width: 50%; background: #ff59aa; transition: width 0.5s ease-in-out; }

    // --- 2. LÓGICA DEL TABLERO ---
    window.generarTablero = function() {
        const board = document.getElementById('board');
        if (!board) return;
        const tokens = board.querySelectorAll('.token');
        board.innerHTML = "";
        tokens.forEach(t => board.appendChild(t));

        mapa.forEach((casilla, i) => {
            const cell = document.createElement('div');
            cell.id = `cell-${i}`;
            cell.className = "celda-juego";
            cell.style.gridColumn = getGridColumn(i);
            cell.style.gridRow = getGridRow(i);
            const grupo = grupos.find(g => g.indices.includes(i));
            cell.style.backgroundColor = grupo ? grupo.color : "#ffccd5";
            cell.innerHTML = `<div style="font-size: 8px;">${casilla.n}</div>`;
            board.appendChild(cell);
        });
    };

    function getGridColumn(i) {
        if (i >= 0 && i <= 7) return 8 - i;
        if (i >= 8 && i <= 14) return 1;
        if (i >= 15 && i <= 21) return (i - 13);
        return 8;
    }

    function getGridRow(i) {
        if (i >= 0 && i <= 7) return 8;
        if (i >= 8 && i <= 14) return 8 - (i - 7);
        if (i >= 15 && i <= 21) return 1;
        return (i - 20);
    }

    // --- 3. FUNCIONES AUXILIARES ---
    window.obtenerGrupo = function(pos) {
        return grupos.find(g => g.indices && g.indices.includes(pos)) || null;
    };

    window.verificarMonopolioEquipo = function(pos, equipo, data) {
        const grupo = window.obtenerGrupo(pos);
        if (!grupo) return false;
        let propiedadesEquipo = Object.values(data.propiedades || {}).filter(p => p.color === grupo.color && p.equipo === equipo).length;
        return propiedadesEquipo === grupo.indices.length;
    };

        function obtenerGrupo(pos) {
    // 1. Verificamos que 'grupos' exista y sea un array
    if (typeof grupos === 'undefined' || !Array.isArray(grupos)) {
        return null;
    }

    // 2. Buscamos el grupo de forma segura
    // Usamos ?. (encadenamiento opcional) para evitar errores si 'indices' falta
    return grupos.find(g => g.indices && g.indices.includes(pos)) || null;
}


        function getColorEquipo(equipo) {
    if (equipo === "A") return "#4a90e2"; // Azul para equipo A
    if (equipo === "B") return "#e74c3c"; // Rojo para equipo B
    return "#cccccc"; // Gris por defecto
}
        
        // Función que verifica si el equipo tiene el monopolio de un color
function verificarMonopolioEquipo(pos, equipo, data) {
    const grupo = obtenerGrupo(pos);
    if (!grupo) return false; // Si no hay grupo, no hay monopolio

    let grupoColor = grupo.color;
    let propiedades = data.propiedades || {};
    let totalNecesario = grupo.indices.length;
    let propiedadesEquipo = 0;

    for (let pId in propiedades) {
        if (propiedades[pId].color === grupoColor && propiedades[pId].equipo === equipo) {
            propiedadesEquipo++;
        }
    }
    return propiedadesEquipo === totalNecesario;
}

    window.iniciarRelojClima = function() {
    // 1. Solo el "Host" (o el primer jugador) debe controlar el clima
    // Esto evita que todos los jugadores intenten cambiarlo al mismo tiempo
    if (window.miIdx !== 0) return;

    // 2. Intervalo seguro (usamos una variable para poder limpiarlo si fuera necesario)
    window.intervaloClima = setInterval(() => {
        if (typeof window.sala === 'undefined' || !window.climas) return;

        const nuevoClimaIdx = Math.floor(Math.random() * window.climas.length);
        const nuevoClima = window.climas[nuevoClimaIdx];

        // 3. Escritura única en Firebase
        window.db.ref('salas/' + window.sala + '/clima').set(nuevoClimaIdx)
            .then(() => {
                window.log("¡El clima ha cambiado a " + nuevoClima.n + "!");
            })
            .catch(err => console.error("Error al actualizar clima:", err));
            
    }, 600000); // 10 minutos
};

        window.abrirInfoReputacion = function() {
    // 1. Verificación robusta
    if (typeof window.jugadores === 'undefined' || !window.jugadores || !window.jugadores[window.miIdx]) {
        console.warn("Información de jugadores no disponible.");

    // 2. Obtener reputación asegurando tipo numérico
    const rep = parseInt(window.jugadores[window.miIdx].reputacion) || 50;
    
    // 3. Estructuración lógica mediante un array (Más escalable que múltiples if-else)
    const niveles = [
        { min: 90, estrellas: "★★★★★", desc: "Hotel de Lujo. Tus propiedades son un éxito absoluto. ¡Alquileres +10%!" },
        { min: 70, estrellas: "★★★★☆", desc: "Muy valorado. Los visitantes están encantados con tu gestión." },

        { min: 0,  estrellas: "★☆☆☆☆", desc: "Reputación crítica. Se esparcen rumores negativos. ¡Tus alquileres están bajando!" }
    ];

    const info = niveles.find(n => rep >= n.min) || niveles[niveles.length - 1];

    // 4. Mostrar en el modal con protección de DOM

        window.verificarLogros = function(idx) {
    // 1. Seguridad: Verificar datos
    if (!window.jugadores || !window.jugadores[idx]) {
        return;
    }

    let jugador = window.jugadores[idx];
    let rep = jugador.reputacion || 0;
    let cambios = {};

    // 2. Magnate de la Reputación (Escudo)
    // Se añade un check adicional para no procesar si ya se otorgó el escudo
    if (rep >= 100 && !jugador.escudo) {
        cambios.escudo = true;
        // Solo alertamos si el jugador es el dueño de esta sesión
        if (idx === window.miIdx) {
            alert("¡FELICIDADES! Has alcanzado 100 de reputación. ¡Has ganado un ESCUDO DE LUJO!");
        }
    }

    // 3. Hotel en Ruinas (Quiebra Técnica)
    if (rep <= 0 && (!jugador.quiebraTecnica || jugador.quiebraTecnica === 0)) {
        cambios.quiebraTecnica = 2;
        if (idx === window.miIdx) {
            alert("¡ADVERTENCIA! Reputación en 0. Entras en QUIEBRA TÉCNICA por 2 turnos.");
        }
    }

    // 4. Escritura atómica
    if (Object.keys(cambios).length > 0 && typeof sala !== 'undefined') {
        db.ref('salas/' + sala + '/jugadores/' + idx).update(cambios)
            .catch(error => console.error("Error al actualizar logros:", error));
    }
};

       window.pagarAlquiler = function(duenoIdx, inquilinoIdx, precioBase) {
    if (typeof window.jugadores === 'undefined' || !window.jugadores[duenoIdx]) {
        console.error("Datos de jugadores no cargados.");
        return;
    }

    if (window.jugadores[duenoIdx].quiebraTecnica > 0) {
        alert("El dueño está en Quiebra Técnica y no puede cobrar alquileres.");
        return;
    }

    if (window.jugadores[duenoIdx].escudo) {
        alert("¡El alquiler fue bloqueado por el Escudo de Lujo!");
        window.db.ref('salas/' + window.sala + '/jugadores/' + duenoIdx).update({ escudo: false });
        return;
    }

    // 1. Calcular monto
    let monto = window.calcularAlquiler(precioBase, duenoIdx);
    
    // 2. Transacción segura: Evita el problema de que el dinero cambie mientras calculas
    // Restamos al inquilino
    window.db.ref('salas/' + window.sala + '/jugadores/' + inquilinoIdx + '/dinero').transaction(d => (d || 0) - monto);
    
    // Sumamos al dueño
    window.db.ref('salas/' + window.sala + '/jugadores/' + duenoIdx + '/dinero').transaction(d => (d || 0) + monto);

    alert("Has pagado $" + monto + " de alquiler.");
};

window.pagarPenalidad = function() {
    // 1. Validaciones básicas de seguridad
    if (typeof sala === 'undefined' || typeof miIdx === 'undefined') return;

    // 2. Bloqueo de UI (asumiendo que usas tu sistema de btn-accion)
    // Si este botón tiene la clase 'btn-accion', no necesitas llamar a toggle manualmente,

    // 3. Ejecución segura con Firebase

   window.unirse = function() {
    const inputSala = document.getElementById('sala-id');
    if (!inputSala || !inputSala.value.trim()) {
        alert("Por favor, ingresa un ID de sala válido.");
        return;
    }
    
    const nombreSala = inputSala.value.trim();

    // 1. Validar existencia de la sala
    db.ref('salas/' + nombreSala).once('value', snap => {
        if (!snap.exists()) {
            document.getElementById('modal-title').innerText = "Sala no encontrada";
            document.getElementById('modal-text').innerHTML = `<p>La sala <b>${nombreSala}</b> no existe. ¿Quieres crearla?</p>`;
            document.getElementById('modal-extra').innerHTML = `
                <button class="btn" onclick="window.crearNuevaSala('${nombreSala}')">Crear Sala</button>
                <button class="btn" onclick="window.cerrarModal()">Cancelar</button>
            `;
            document.getElementById('modal').style.display = 'block';
        } else {
            // 2. Antes de unir, limpiamos cualquier escucha previa de jugadores para evitar duplicados
            db.ref('salas/' + nombreSala + '/jugadores').off('value');
            
            // 3. Procedemos con la unión
            window.procederConUnion(nombreSala);
            
            // 4. Establecemos la escucha constante tras asegurar la unión
            db.ref('salas/' + nombreSala + '/jugadores').on('value', (snap) => {
                window.jugadores = snap.val() || [];
                if (typeof window.sincronizar === 'function') window.sincronizar();
            });
            
            if (typeof window.escucharOfertas === 'function') window.escucharOfertas();
        }
    });
};

window.procederConUnion = function(nombreSala) {
    // Red de seguridad: si ya entramos, no duplicar procesos
    if (window.yaEntro) return;
    
    window.sala = nombreSala; // Asignación explícita
    
    let btn = document.getElementById('btn-unirse');
    if (btn) {
        btn.disabled = true;
        btn.innerText = "Conectando...";
    }

    db.ref('salas/' + window.sala + '/jugadores').once('value', snap => {
        let jugadores = snap.val() || [];
        let listaJugadores = Array.isArray(jugadores) ? jugadores : Object.values(jugadores);
        
        let miNombre = localStorage.getItem('monopoly_nombre') || "Jugador " + (listaJugadores.length + 1);
        let indexEncontrado = listaJugadores.findIndex(j => j && j.nombre === miNombre);
        
        window.miIdx = (indexEncontrado !== -1) ? indexEncontrado : listaJugadores.length;
        localStorage.setItem('monopoly_nombre', miNombre);
        
        let jugadorData = {
            nombre: miNombre,
            pos: (indexEncontrado !== -1 && listaJugadores[window.miIdx]) ? listaJugadores[window.miIdx].pos : 0,
            conectado: true,
            lastSeen: firebase.database.ServerValue.TIMESTAMP
        };
        
        // Unión atómica usando la variable global window.sala definida arriba
        db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx).update(jugadorData)
        .then(() => {
            window.yaEntro = true;
            if (typeof window.sincronizar === 'function') window.sincronizar();
            console.log("Unido correctamente a sala:", window.sala);
        })
        .catch(error => {
            console.error("Error crítico al unirse:", error);
            if (btn) {
                btn.disabled = false;
                btn.innerText = "Unirse";
            }
        });
    });
};

window.calcularAlquiler = function(precioBase, duenoIdx) {
    // 1. Obtención segura del objeto dueño
    const jugadorDueño = (window.jugadores && window.jugadores[duenoIdx]) ? window.jugadores[duenoIdx] : null;
    
    // 2. Cálculo de reputación con valores por defecto seguros
    const rep = (jugadorDueño && typeof jugadorDueño.reputacion === 'number') ? jugadorDueño.reputacion : 50;
    
    let multiplicador = 1.0; 
    if (rep >= 90) multiplicador = 1.10;      // Bonus: +10%
    else if (rep <= 30) multiplicador = 0.85; // Rumores: -15%

    const precioAjustado = precioBase * multiplicador;

    // 3. Verificación de bonos de aliado
    const bonoAliado = (typeof obtenerBonosReputacion === 'function') ? obtenerBonosReputacion(window.miIdx) : 1.0;
    
    // 4. Retorno final redondeado
    return Math.floor(precioAjustado * bonoAliado);
};
        
        window.obtenerAlquilerFerrocarril = function(dueñoIdx, todasLasPropiedades) {
    // 1. Validaciones de seguridad iniciales
    if (!todasLasPropiedades || typeof dueñoIdx === 'undefined') return 0;
    
    const indicesTransporte = [8, 24, 26, 27];
    let cantidad = 0;
    
    // 2. Conteo de ferrocarriles poseídos
    indicesTransporte.forEach(idx => {
        const prop = todasLasPropiedades[idx];
        // Validamos que la propiedad exista y tenga el owner correcto
        if (prop && prop.owner === dueñoIdx) {
            cantidad++;
        }
    });

    // 3. Tabla de alquileres (Escalabilidad protegida)
    const tabla = { 1: 100, 2: 150, 3: 250, 4: 300 };
    
    // Retornamos el valor basado en la cantidad, si es 0, devuelve 0
    return tabla[cantidad] || 0;
};

            <p>Para realizar un intercambio, debes insertar un valor <b>entre 100 y 999</b>.</p>
        </div>
    `;
    document.getElementById('modal-extra').innerHTML = `<button class="btn" onclick="window.cerrarModal()">Entendido</button>`;
    modal.style.display = 'block';
};

window.proponerVenta = function(pIdx) {
    let sel = document.getElementById('sel-' + pIdx);
    let input = document.getElementById('precio-' + pIdx);
    
    if (!sel || !input) return;

    let comprador = parseInt(sel.value);
    let precio = parseInt(input.value);

    if (isNaN(comprador)) { alert("Debes seleccionar un comprador."); return; }
    if (isNaN(precio) || precio < 100 || precio > 999) { window.mostrarAvisoIntercambio(); return; }

    if (confirm(`¿Proponer venta de propiedad ${pIdx} por $${precio}?`)) {
        let oferta = {
            propiedad: parseInt(pIdx),
            vendedor: parseInt(window.miIdx),
            comprador: comprador,
            precio: precio,
            estado: 'pendiente',
            timestamp: Date.now()
        };

        window.db.ref('salas/' + window.sala + '/ofertas').push(oferta).then(() => {
            let nombreProp = (typeof window.mapa !== 'undefined' && window.mapa[pIdx]) ? window.mapa[pIdx].n : "propiedad";
            let nombreComp = (window.nombres && window.nombres[comprador]) ? window.nombres[comprador] : "Jugador " + (comprador + 1);
            
            if (typeof window.log === 'function') {
                window.log(window.nombres[window.miIdx] + " propuso vender " + nombreProp + " a " + nombreComp + " por $" + precio);
            }
            if (typeof window.cerrarModal === 'function') window.cerrarModal();
        }).catch(err => console.error("Error al proponer venta:", window.log ? err : ""));
    }
};
      
// --- 1. LÓGICA DE COMPRA (Transacción Atómica) ---
window.confirmarCompra = function(ofertaKey) {
    if (typeof window.sala === 'undefined' || !window.sala) return;

    window.db.ref('salas/' + window.sala + '/ofertas/' + ofertaKey).once('value', snap => {
        let o = snap.val();
        if (!o) {
            alert("Esta oferta ya no existe.");
            return;
        }

        let pIdx = parseInt(o.prop);
        let compradorIdx = parseInt(o.para);
        let vendedorIdx = parseInt(o.de);
        let precio = parseInt(o.precio);

        window.db.ref('salas/' + window.sala).transaction(data => {
            if (!data || !data.jugadores || !data.jugadores[compradorIdx] || !data.jugadores[vendedorIdx]) return;

            let dineroComprador = Number(data.jugadores[compradorIdx].dinero) || 0;

            if (dineroComprador < precio) {
                console.warn("Fondos insuficientes");
                return;
            }

            data.jugadores[compradorIdx].dinero = dineroComprador - precio;
            data.jugadores[vendedorIdx].dinero = (Number(data.jugadores[vendedorIdx].dinero) || 0) + precio;

            if (!data.propiedades) data.propiedades = {};
            data.propiedades[pIdx] = { owner: compradorIdx };

            return data;
        }, (error, committed) => {
            if (error) {
                console.error("Error en la transacción:", error);
                alert("Hubo un error al procesar la compra.");
            } else if (committed) {
                window.db.ref('salas/' + window.sala + '/ofertas/' + ofertaKey).remove();
                let modal = document.getElementById('modal');
                if (modal) modal.style.display = 'none';
                if (typeof window.log === 'function') window.log("¡Venta completada!");
            } else {
                alert("¡No tienes suficiente dinero para esta compra!");
            }
        });
    });
};

// --- 2. ESCUCHA DE OFERTAS ---
window.escucharOfertas = function() {
    if (typeof window.sala === 'undefined' || !window.sala) return;
    
    window.db.ref('salas/' + window.sala + '/ofertas').off('child_added'); 
    
    window.db.ref('salas/' + window.sala + '/ofertas').on('child_added', snap => {
        let o = snap.val();
        
        if (o && o.para === window.miIdx) {
            let nombreVendedor = (window.nombres && window.nombres[o.de]) ? window.nombres[o.de] : "Alguien";
            
            let modalTitle = document.getElementById('modal-title');
            let modalText = document.getElementById('modal-text');
            let modalExtra = document.getElementById('modal-extra');
            let modal = document.getElementById('modal');

            if (modalTitle && modalText && modalExtra && modal) {
                modalTitle.innerText = "¡Oferta de Venta!";
                modalText.innerHTML = `<p>${nombreVendedor} te vende una propiedad por <b>$${o.precio}</b></p>`;
                
                modalExtra.innerHTML = `
                    <button class="btn" onclick="window.confirmarCompra('${snap.key}')">Aceptar</button>
                    <button class="btn" onclick="window.cerrarModal()">Cancelar</button>
                `;
                modal.style.display = 'block';
            }
        }
    });
};

// --- 3. FORMULARIO DE INTERCAMBIO ---
window.abrirIntercambio = function() {
    let modal = document.getElementById('modal');
    let modalExtra = document.getElementById('modal-extra');
    let modalText = document.getElementById('modal-text');
    let modalTitle = document.getElementById('modal-title');

    if (!modal || !modalExtra || !modalText || !modalTitle) return;

    modalExtra.innerHTML = "";
    
    window.db.ref('salas/' + window.sala).once('value', snap => {
        let data = snap.val();
        if (!data) return;

        let misProps = [];
        if (data.propiedades) {
            Object.keys(data.propiedades).forEach(pIdx => {
                if (data.propiedades[pIdx] && data.propiedades[pIdx].owner === window.miIdx) {
                    misProps.push(pIdx);
                }
            });
        }
        
        if (misProps.length === 0) {
            modalTitle.innerText = "¡Atención!";
            modalText.innerHTML = '<div class="card-property"><p style="text-align: center; padding: 10px;">No tienes propiedades para vender.</p></div>';
            modalExtra.innerHTML = '<button class="btn" onclick="window.cerrarModal()">Cerrar</button>';
            modal.style.display = 'block';
            return;
        }
        
        modalTitle.innerText = "Revender Propiedad";
        let html = '<div class="card-property">Selecciona propiedad, precio (100-999) y comprador:<br><br>';
        
        misProps.forEach(pIdx => {
            let p = (typeof window.mapa !== 'undefined') ? window.mapa[pIdx] : { n: "Propiedad " + pIdx };
            html += `<b>${p.n}</b>:<br>
                     <input type="number" id="precio-${pIdx}" min="100" max="999" value="250" style="width: 80px;"> 
                     <select id="sel-${pIdx}">`;
            
            if (data.jugadores && Array.isArray(data.jugadores)) {
                data.jugadores.forEach((j, i) => { 
                    if (i !== window.miIdx) {
                        let nombreJugador = (window.nombres && window.nombres[i]) ? window.nombres[i] : "Jugador " + (i + 1);
                        html += `<option value="${i}">${nombreJugador}</option>`; 
                    }
                });
            }
            html += `</select> <button class="btn" onclick="window.proponerVenta(${pIdx})">Vender</button><br><br>`;
        });
        
        html += '</div>';
        modalText.innerHTML = html;
        modalExtra.innerHTML = '<button class="btn" onclick="window.cerrarModal()">Cerrar</button>';
        modal.style.display = 'block';
    });
};

// --- 1. HIPOTECAS Y LIBERACIÓN ---
window.hipotecar = function(pos) {
    if (typeof window.sala === 'undefined' || !window.mapa[pos]) return;
    
    window.db.ref('salas/' + window.sala + '/propiedades/' + pos).update({ hipotecada: true });
    window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx + '/dinero')
        .transaction(d => (d || 0) + Math.floor(window.mapa[pos].p / 2));
    
    if (typeof window.log === 'function') window.log(window.nombres[window.miIdx] + " hipotecó " + window.mapa[pos].n);
    let modal = document.getElementById('modal');
    if (modal) modal.style.display = 'none';
};

window.liberar = function(pos) {
    if (typeof window.sala === 'undefined' || !window.mapa[pos]) return;
    
    window.db.ref('salas/' + window.sala + '/propiedades/' + pos).update({ hipotecada: false });
    window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx + '/dinero')
        .transaction(d => (d || 0) - Math.floor(window.mapa[pos].p * 0.6));
    
    if (typeof window.log === 'function') window.log(window.nombres[window.miIdx] + " liberó " + window.mapa[pos].n);
    let modal = document.getElementById('modal');
    if (modal) modal.style.display = 'none';
};

// --- 2. MANEJO DE CASILLA ---
window.manejarCasilla = function(pos) {
    if (typeof window.mapa === 'undefined' || !window.mapa[pos]) return;

    // CASO FERROCARRILES (Color #f5f5dc)
    let g = (typeof window.obtenerGrupo === 'function') ? window.obtenerGrupo(pos) : null;
    if (g && g.color === "#f5f5dc") {
        window.db.ref('salas/' + window.sala).once('value', snap => {
            let data = snap.val() || {};
            let prop = data.propiedades ? data.propiedades[pos] : null;
            
            if (!prop) {
                window.verPropiedad(pos, true);
            } else if (prop.owner !== window.miIdx) {
                let esAliado = (data.jugadores && data.jugadores[window.miIdx] && prop.equipo === data.jugadores[window.miIdx].equipo);
                
                if (esAliado) {
                    window.log("¡Es propiedad de tu aliado, estás a salvo!");
                } else {
                    let trans = [8, 24, 26, 27];
                    let count = trans.filter(i => data.propiedades && data.propiedades[i] && data.propiedades[i].owner === prop.owner).length;
                    let alquiler = { 1: 100, 2: 150, 3: 250, 4: 300 }[count] || 100;
                    
                    window.procesarPago(window.miIdx, prop.owner, alquiler);
                    window.log(window.nombres[window.miIdx] + " pagó $" + alquiler + " de transporte.");
                }
            } else {
                window.verPropiedad(pos, false);
            }
        });
        return;
    }

    // CASO PROPIEDAD NORMAL
    window.db.ref('salas/' + window.sala + '/propiedades/' + pos).once('value', snap => {
        let prop = snap.val();
        if (prop && prop.owner !== undefined && prop.owner !== window.miIdx) {
            let esAliado = (window.jugadores && window.jugadores[window.miIdx] && prop.equipo === window.jugadores[window.miIdx].equipo);
            if (esAliado) {
                window.log("¡Propiedad de tu aliado, a salvo!");
                return;
            }
        }
        window.verPropiedad(pos, (prop && prop.owner === undefined)); 
    });
};

// --- 3. MODO 2V2 ---
window.toggleModo2v2 = function() {
    if (typeof window.sala === 'undefined' || !window.sala) return;

    window.db.ref('salas/' + window.sala + '/jugadores').once('value', snap => {
        let jugadores = snap.val();
        if (!jugadores) return;

        let keys = Object.keys(jugadores);
        if (keys.length !== 4) {
            alert("El modo 2v2 requiere 4 jugadores. Actualmente hay: " + keys.length);
            return;
        }

        let actualizaciones = {};
        keys.forEach((idx, i) => {
            let equipoAsignado = (i < 2) ? "A" : "B";
            actualizaciones['jugadores/' + idx] = { 
                ...jugadores[idx],
                equipo: equipoAsignado,
                reputacion: 50
            };
        });

        actualizaciones['config'] = { 
            modo: '2v2',
            equipoA: [parseInt(keys[0]), parseInt(keys[1])],
            equipoB: [parseInt(keys[2]), parseInt(keys[3])]
        };
        actualizaciones['modo2v2'] = true;

        window.db.ref('salas/' + window.sala).update(actualizaciones)
            .then(() => {
                if (typeof window.log === 'function') window.log("¡Modo 2v2 ACTIVADO!");
            })
            .catch(error => console.error("Error al activar 2v2:", error));
    });
};

window.intentarHackeo = function() {
    if (typeof window.sala === 'undefined' || typeof window.miIdx === 'undefined') return;

    let exito = Math.random() < 0.5;
    let jugadorRef = window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx);

    if (exito) {
        if (typeof window.log === 'function') window.log((window.nombres[window.miIdx] || "Jugador") + " ¡HACKEO EXITOSO!");
        jugadorRef.update({ enCarcel: 0 });
        let modal = document.getElementById('modal');
        if (modal) modal.style.display = 'none';
    } else {
        if (typeof window.log === 'function') window.log((window.nombres[window.miIdx] || "Jugador") + " ¡FALLASTE!");
        
        jugadorRef.once('value', snap => {

            if (j) {

                jugadorRef.update({ enCarcel: nuevaCondena });
            }
        });

        let modal = document.getElementById('modal');
        if (modal) modal.style.display = 'none';

};

window.pagarFianza = function() {
    if (typeof window.sala === 'undefined' || typeof window.miIdx === 'undefined') return;

    window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx).update({
        enCarcel: 0,
        dinero: firebase.database.ServerValue.increment(-200)
    });

    if (typeof window.log === 'function') window.log(window.nombres[window.miIdx] + " pagó la fianza.");
    let modal = document.getElementById('modal');
    if (modal) modal.style.display = 'none';

window.quedarseEnCarcel = function() {
    if (typeof window.log === 'function') window.log(window.nombres[window.miIdx] + " cumplirá su condena.");
    let modal = document.getElementById('modal');
    if (modal) modal.style.display = 'none';
    if (typeof window.pasarTurno === 'function') window.pasarTurno();
};

// --- 2. GESTIÓN DE TURNOS ---
window.pasarTurno = function() {
    if (typeof window.turnosSeis !== 'undefined') window.turnosSeis = 0;

    window.db.ref('salas/' + window.sala).once('value', snap => {
        let data = snap.val();
        let total = Object.keys(data.jugadores).length;
        let t = Number(data.turno);
        
        let nuevoTurno = (t + 1) % total;
        let intentos = 0;

        while (data.jugadores[nuevoTurno].enCarcel > 0 && intentos < total) {
            window.log(window.nombres[nuevoTurno] + " está en la cárcel. Saltando...");
            
            window.db.ref('salas/' + window.sala + '/jugadores/' + nuevoTurno)
              .update({ enCarcel: data.jugadores[nuevoTurno].enCarcel - 1 });
            
            nuevoTurno = (nuevoTurno + 1) % total;
            intentos++;
        }

        window.db.ref('salas/' + window.sala + '/turno').set(nuevoTurno);
        window.log("Es el turno de " + window.nombres[nuevoTurno]);
    });
};

        /**
 * Verifica si el jugador aún existe en la sala.
 * Si no existe, lo expulsa. Si existe, ejecuta la acción (callback).
 */
// --- 1. VALIDACIÓN DE SESIÓN Y SEGURIDAD ---
window.validarSesion = async function(callback) {
    if (typeof window.sala === 'undefined' || typeof window.miIdx === 'undefined') {
        alert("Sesión perdida. Redirigiendo...");
        window.location.href = "/login.html";
        return;
    }

    // Bloqueo total para evitar Race Conditions
    window.bloquearBotones(true);

    try {
        const snap = await window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx).once('value');
        
        if (!snap.exists()) {
            console.error("Jugador no encontrado. Expulsando...");
            alert("Has sido desconectado o expulsado.");
            window.location.href = "/login.html";
        } else {
            await callback();
        }
    } catch (error) {
        console.error("Error al validar sesión:", error);
        alert("Error de conexión. Inténtalo de nuevo.");
    } finally {
        window.bloquearBotones(false);
    }
};

// --- 2. GESTIÓN DE UI Y ESTADOS ---
window.bloquearBotones = function(bloquear = true) {
    const botones = document.querySelectorAll('.btn');
    botones.forEach(btn => {
        btn.disabled = bloquear;
        btn.style.opacity = bloquear ? "0.5" : "1";
        btn.style.cursor = bloquear ? "not-allowed" : "pointer";
    });
};

window.toggleBotonesAccion = function(bloqueado = true) {
    const botones = document.querySelectorAll('.btn-accion');
    botones.forEach(btn => {
        btn.disabled = bloqueado;
        btn.style.opacity = bloqueado ? "0.5" : "1";
        btn.style.cursor = bloqueado ? "not-allowed" : "pointer";
    });
};

window.actualizarControles = function(s) {
    if (typeof window.miIdx === 'undefined') return;

    const esMiTurno = (s.turno === window.miIdx);
    // Acceso seguro al estado de cárcel
    const enCarcel = (s.jugadores && s.jugadores[window.miIdx]) ? (s.jugadores[window.miIdx].enCarcel > 0) : false;

    const btnTirar = document.getElementById('btn-tirar-dado');
    const btnPasar = document.getElementById('btn-pasar-turno');

    if (!esMiTurno) {
        if (btnTirar) btnTirar.disabled = true;
        if (btnPasar) btnPasar.disabled = true;
    } else {
        // En tu turno: no puedes tirar si estás en la cárcel
        if (btnTirar) btnTirar.disabled = enCarcel;
        if (btnPasar) btnPasar.disabled = false;
    }
};
        
       // --- 1. VISUALIZACIÓN DE PROPIEDAD Y ACCIONES ---
window.verPropiedad = function(pos, esCaida = false) {
    let modal = document.getElementById('modal');
    let modalText = document.getElementById('modal-text');
    let modalExtra = document.getElementById('modal-extra');
    let modalTitle = document.getElementById('modal-title');

    if (!modal || !modalText || !window.mapa[pos]) return;

    let p = window.mapa[pos];
    modalExtra.innerHTML = "";
    modalText.innerHTML = "";

    if (p.p === 0) {
        modalTitle.innerText = p.n;
        modalText.innerHTML = "Casilla especial: " + p.n;
        modalExtra.innerHTML = `<button class="btn" onclick="window.cerrarModal()">Cerrar</button>`;
        modal.style.display = 'block';
        return;
    }
    
    let g = (typeof window.obtenerGrupo === 'function') ? window.obtenerGrupo(pos) : null;
    let esFerrocarril = (g && g.color === "#f5f5dc");
    
    window.db.ref('salas/' + window.sala).once('value', snap => {
        let data = snap.val() || {};
        let prop = data.propiedades ? data.propiedades[pos] : null;
        
        let multClima = (data.clima !== undefined && typeof window.climas !== 'undefined') ? window.climas[data.clima].mult : 1.0;
        let nombreClima = (data.clima !== undefined && typeof window.climas !== 'undefined') ? window.climas[data.clima].n : 'Normal';
        
        let porcentajes = [0.10, 0.15, 0.20, 0.30, 0.40, 0.50];
        let nivelesNombres = ["Base", "1 Casa", "2 Casas", "3 Casas", "4 Casas", "Hotel"];
        let listaAlquileres = "";
        
        porcentajes.forEach((porc, i) => {
            let precioNormal = Math.floor(p.p * porc);
            let precioClima = Math.floor(precioNormal * multClima);
            let notaClima = (multClima !== 1) ? ` <small style="color:red;">(c/clima: $${precioClima})</small>` : "";
            listaAlquileres += `<li>${nivelesNombres[i]}: $${precioNormal}${notaClima}</li>`;
        });

        modalTitle.innerText = "Tarjeta de Propiedad";
        let dueño = (prop && window.nombres && window.nombres[prop.owner]) ? window.nombres[prop.owner] : "Disponible";
        
        modalText.innerHTML = `
            <div class="card-property">
                <div class="card-header">${p.n}</div>
                <p>Valor compra: <b>$${esFerrocarril ? 600 : p.p}</b></p>
                <p>Dueño: <b>${dueño}</b></p>
                <hr><p><b>Alquileres (Clima: ${nombreClima}):</b></p>
                <ul style="font-size: 0.9em; padding-left: 20px;">
                    ${esFerrocarril ? "<li>Si se poseen: $200, $250, $350, $450</li>" : listaAlquileres}
                </ul>
            </div>`;

        // Botones dinámicos
        if (!prop && esCaida) {
            modalExtra.innerHTML = `<button class="btn btn-accion" onclick="window.validarSesion(() => window.comprar(${pos}))">Comprar ($${esFerrocarril ? 600 : p.p})</button>`;
        } else if (prop && prop.owner === window.miIdx) {
            if (!esFerrocarril && (prop.nivel || 0) < 5) 
                modalExtra.innerHTML += `<button class="btn btn-accion" onclick="window.validarSesion(() => window.mejorar(${pos}))">Mejorar ($50)</button>`;
            
            let funcHipotecar = prop.hipotecada ? `window.validarSesion(() => window.liberar(${pos}))` : `window.validarSesion(() => window.hipotecar(${pos}))`;
            modalExtra.innerHTML += `<button class="btn btn-accion" style="background: #ad0c0c;" onclick="${funcHipotecar}">${prop.hipotecada ? "Liberar" : "Hipotecar"}</button>`;
        } else if (prop && prop.owner !== window.miIdx && esCaida && !prop.hipotecada) {
            let alqFinal = esFerrocarril ? 200 : Math.floor(Math.floor(p.p * porcentajes[prop.nivel || 0]) * multClima);
            modalExtra.innerHTML = `<button class="btn btn-accion" onclick="window.validarSesion(() => window.procesarPago(${window.miIdx}, ${prop.owner}, ${alqFinal}))">Pagar Alquiler ($${alqFinal})</button>`;
        }

        modalExtra.innerHTML += `<button class="btn" onclick="window.cerrarModal()">Cerrar</button>`;
        modal.style.display = 'block';
    });
};

// --- 2. SISTEMA DE MEJORAS (Monopolio) ---
window.mejorar = async function(pos) {
    if (typeof window.sala === 'undefined') return;

    window.db.ref('salas/' + window.sala).once('value', async snap => {
        let data = snap.val();
        if (!data || !data.propiedades || !data.propiedades[pos]) return;

        let prop = data.propiedades[pos];
        let miEquipo = (window.jugadores && window.jugadores[window.miIdx]) ? window.jugadores[window.miIdx].equipo : null;
        let nivelActual = prop.nivel || 0;

        await window.ejecutarMejora(pos, nivelActual, miEquipo, prop, data);
    });
};

window.ejecutarMejora = function(pos, nivelActual, miEquipo, prop, data) {
    return new Promise((resolve) => {
        let tieneMonopolio = typeof window.verificarMonopolioEquipo === 'function' ? window.verificarMonopolioEquipo(pos, miEquipo, data) : false;

        if (!tieneMonopolio) { alert("Necesitas el control total del grupo."); resolve(); return; }
        if (nivelActual >= 5) { alert("Ya está al nivel máximo."); resolve(); return; }

        window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx + '/dinero').transaction(dinero => {
            if (dinero >= 50) {
                window.db.ref('salas/' + window.sala + '/propiedades/' + pos).update({ nivel: nivelActual + 1 });
                if (typeof window.log === 'function') window.log(`${window.nombres[window.miIdx]} mejoró ${window.mapa[pos].n} al nivel ${nivelActual + 1}`);
                if (typeof window.cerrarModal === 'function') window.cerrarModal();
                return dinero - 50;
            }
            alert("No tienes suficiente dinero.");
            return;
        }, (error) => { resolve(); });
    });
};
             
    
    // --- 1. LÓGICA DE DADOS Y TURNO ---
window.tirarDado = async function() {
    if (typeof window.miIdx === 'undefined' || window.miIdx === -1) return;

    const btnDado = document.querySelector('img[alt="Lanzar dado"]');
    if (btnDado) btnDado.style.pointerEvents = 'none';

    return new Promise((resolve) => {
        window.db.ref('salas/' + window.sala).once('value', snap => {
            const s = snap.val();
            if (!s || s.turno !== window.miIdx) {
                if (btnDado) btnDado.style.pointerEvents = 'auto';
                resolve();
                return;
            }

            if (s.jugadores[window.miIdx].enCarcel > 0) {
                window.log(window.nombres[window.miIdx] + " está en la cárcel.");
                window.pasarTurno();
                if (btnDado) btnDado.style.pointerEvents = 'auto';
                resolve();
                return;
            }

            if (typeof window.climas !== 'undefined') {
                const nuevoClima = Math.floor(Math.random() * window.climas.length);
                window.db.ref('salas/' + window.sala + '/clima').set(nuevoClima);
            }

            const dado = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dado-valor').innerText = dado;

            const contadorActual = s.jugadores[window.miIdx].seisSeguidos || 0;
            const nuevoContador = (dado === 6) ? contadorActual + 1 : 0;
            const posActual = Number(s.jugadores[window.miIdx].pos);
            const nuevaPos = (posActual + dado) % window.mapa.length;

            if (nuevaPos < posActual) {
                window.db.ref('salas/'+window.sala+'/jugadores/'+window.miIdx+'/dinero').transaction(d => (d || 0) + 100);
                window.log(window.nombres[window.miIdx] + " pasó por SALIDA y cobró $100.");
            }

            if (nuevoContador === 3) {
                window.log("¡ACUSACIÓN DE FRAUDE! " + window.nombres[window.miIdx] + " sacó tres 6.");
                window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx).update({ pos: 9, enCarcel: 2, seisSeguidos: 0 });
                window.pasarTurno();
            } else {
                window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx).update({ pos: nuevaPos, seisSeguidos: nuevoContador });
                if (dado !== 6) window.pasarTurno();
                else window.log("¡Sacaste un 6! Tienes turno extra.");
            }

            setTimeout(() => {
                if (typeof window.manejarCasilla === 'function') window.manejarCasilla(nuevaPos);
                if (btnDado) btnDado.style.pointerEvents = 'auto';
                resolve();
            }, 800);
        });
    });
};

// --- 2. GESTIÓN DE PRÉSTAMOS Y SALDOS ---
window.pagarPrestamo = async function() {
    if (typeof window.sala === 'undefined' || typeof window.miIdx === 'undefined') return;

    window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx).once('value', snap => {
        let j = snap.val();
        if (!j) return;

        if (j.tienePrestamo && j.dinero >= j.montoPrestamo) {
            window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx).update({
                dinero: firebase.database.ServerValue.increment(-j.montoPrestamo),
                tienePrestamo: false,
                montoPrestamo: 0
            }, (error) => {
                if (!error) {
                    window.log(window.nombres[window.miIdx] + " liquidó su préstamo.");
                    if (typeof window.cerrarModal === 'function') window.cerrarModal();
                }
            });
        } else {
            window.abrirModal("Banco", j.tienePrestamo ? "Fondos insuficientes." : "No tienes préstamos.");
        }
    });
};

window.verSaldos = function() {
    window.db.ref('salas/' + window.sala + '/jugadores').once('value', snap => {
        let txt = "<ul style='list-style:none; padding:0;'>";
        snap.forEach(c => {
            let j = c.val();
            let idx = parseInt(c.key);
            txt += `<li><b>${window.nombres[idx] || 'Jugador'}</b>: $${j.dinero || 0}</li>`;
        });
        txt += "</ul>";
        window.abrirModal("Saldos de los jugadores", txt);
    });
};

// --- 3. SINCRONIZACIÓN Y MOTOR ---
window.sincronizar = async function() {
    if (typeof window.yaEntro === 'undefined' || !window.yaEntro || !window.sala) return;

    window.db.ref('salas/' + window.sala + '/chat').on('value', (snap) => {
        let chatLog = document.getElementById('chat-log');
        if (!chatLog) return;
        let html = "";
        snap.forEach(msgSnap => {
            let m = msgSnap.val();
            html += `<div>${m.t ? `<small style="color:gray;">[${m.t}]</small> ` : ""}<b>${m.n || "Anónimo"}:</b> ${m.m}</div>`;
        });
        chatLog.innerHTML = html;
        chatLog.scrollTop = chatLog.scrollHeight;
    });

    window.db.ref('salas/' + window.sala).on('value', (snap) => { 
        let s = snap.val(); 
        if(!s) return; 

        if (s.jugadores && s.jugadores[window.miIdx]) {
            let p = s.jugadores[window.miIdx];
            if (document.getElementById('dinero-mio')) document.getElementById('dinero-mio').innerText = p.dinero || 0;
        }

        if (document.getElementById('turno-text')) 
            document.getElementById('turno-text').innerText = "Turno: " + (s.turno !== undefined && typeof window.nombres !== 'undefined' ? (window.nombres[s.turno] || "Jugador " + (s.turno + 1)) : "Esperando...");
            
        if(s.clima !== undefined && typeof window.climas !== 'undefined') 
            document.getElementById('clima-display').innerText = "Estación: " + window.climas[s.clima].n; 

        if (s.jugadores) {
            s.jugadores.forEach((j, i) => { 
                let el = document.getElementById('p' + i); 
                let cell = j ? document.getElementById('cell-' + j.pos) : null;
                if (el && cell) {
                    el.style.left = (cell.offsetLeft + 30) + 'px'; 
                    el.style.top = (cell.offsetTop + 30) + 'px';
                }
            });
        }
    });
};

        // 3. ACTUALIZACIÓN DE CONTROLES (Seguridad)
        // Decidimos qué botones habilitar basándonos exclusivamente en el snapshot actual
        // --- 1. MOTOR DE ACTUALIZACIÓN DEL TABLERO (Propiedades y Casas) ---
window.renderizarTablero = function(s) {
    if (!s.propiedades) return;

    Object.keys(s.propiedades).forEach(pos => {
        let cell = document.getElementById('cell-' + pos);
        if (!cell) return;
        
        // Color de dueño (haciendo uso seguro de window.colores)
        if (typeof window.colores !== 'undefined') {
            cell.style.backgroundColor = s.propiedades[pos].hipotecada ? "#ccc" : (window.colores[s.propiedades[pos].owner] || "#fff");
        }
        
        // Renderizado de casas y hoteles
        let hc = cell.querySelector('.house-container'); 
        if (hc) {
            hc.innerHTML = "";
            let nivel = s.propiedades[pos].nivel || 0;
            if (nivel > 0 && nivel < 5) {
                for (let i = 0; i < nivel; i++) { 
                    let h = document.createElement('div'); h.className = 'house'; hc.appendChild(h); 
                }
            } else if (nivel === 5) { 
                let h = document.createElement('div'); h.className = 'hotel'; hc.appendChild(h); 
            }
        }
    });
};

// --- 2. GESTIÓN DE ACCIONES Y MODALES ---
window.comprar = async function(pos) {
    if (typeof window.sala === 'undefined' || !window.sala) return;
    let precio = window.mapa[pos].p;

    // 1. Primero verifica el saldo
    const snap = await window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx + '/dinero').once('value');
    if ((snap.val() || 0) < precio) {
        alert("No tienes suficiente dinero.");
        return;
    }

    // 2. Luego realiza la transacción si tiene saldo
    return new Promise((resolve) => {
        window.db.ref('salas/' + window.sala + '/propiedades/' + pos).transaction(function(currentProp) {
            return (currentProp === null) ? { owner: window.miIdx, nivel: 0, hipotecada: false } : undefined;
        }, function(error, committed) {
            if (committed) {
                window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx + '/dinero')
                    .transaction(d => (d || 0) - precio);
                window.cerrarModal();
            } else if (!error) {
                alert("Esta propiedad ya ha sido comprada.");
            }
            resolve();
        });
    });
};

window.cerrarModal = function() { 
    let modal = document.getElementById('modal');
    if (modal) modal.style.display = 'none';
    let extra = document.getElementById('modal-extra');
    if (extra) extra.innerHTML = ""; 
};

window.abrirModal = function(titulo, contenido) {
    document.getElementById('modal-title').innerText = titulo;
    document.getElementById('modal-text').innerHTML = contenido;
    document.getElementById('modal').style.display = 'block';
};

// --- 3. UTILIDADES Y EVENTOS ---
window.log = function(txt) { 
    if (typeof window.sala !== 'undefined') window.db.ref('salas/' + window.sala + '/log').push(txt); 
};

window.obtenerCarta = function() { 
    return (typeof window.cartasEvento !== 'undefined') ? window.cartasEvento[Math.floor(Math.random() * window.cartasEvento.length)] : "Evento por defecto";
};

window.abrirInfoReputacion = function() {
    if (!window.jugadores || !window.jugadores[window.miIdx]) return;
    alert("Tu reputación actual es: " + (window.jugadores[window.miIdx].reputacion || 100));
};

// --- 4. INICIALIZACIÓN ---
window.addEventListener('load', () => {
    // Se asegura de que el tablero se genere tras cargar los recursos
    if (typeof window.generarTablero === 'function') {
        setTimeout(window.generarTablero, 500);
    }
});
